<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Dashboard</title>
    <link rel="stylesheet" href="/local-market/assets/shop.css">
</head>
<body>
    <div class="shop-container">
        <div class="shop-header">
            <h1 id="shopName">Loading...</h1>
            <span class="badge" id="shopStatus"></span>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><h3 id="totalProducts">0</h3><p>Menu Items</p></div>
            <div class="stat-card"><h3 id="activeOrders">0</h3><p>Active Orders</p></div>
            <div class="stat-card"><h3 id="todayOrders">0</h3><p>Today Orders</p></div>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" onclick="loadTemplate('menu-form')">+ Add Menu Item</button>
            <button class="btn btn-secondary" onclick="loadOrders()">View Orders</button>
            <button class="btn btn-warning" onclick="toggleShopStatus()">Open/Close Shop</button>
        </div>

        <div class="content-area">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Dish Name</th><th>Category</th><th>Type</th><th>Price</th><th>Available</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productTableBody"></tbody>
            </table>
        </div>
    </div>
    
    <div id="modalContainer"></div>
    <script src="/local-market/assets/shop-core.js"></script>
    <script>initDashboard('restaurant');</script>
</body>
</html>
