<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Kirana Store</title>
    <link rel="stylesheet" href="/local-market/assets/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #334155;
        }
        .form-header h1 {
            margin: 0;
            font-size: 24px;
            color: #1e293b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #f5576c;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fa fa-arrow-left"></i>
            </button>
            <h1 id="formTitle">Add Product</h1>
        </div>

        <form id="productForm">
            <input type="hidden" id="itemId">
            
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="name" placeholder="Example: Aashirvaad Atta" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Weight *</label>
                    <input type="number" id="weight" placeholder="5" required>
                </div>
                <div class="form-group">
                    <label>Unit *</label>
                    <select id="unit" required>
                        <option value="kg">KG</option>
                        <option value="gram">Gram</option>
                        <option value="litre">Litre</option>
                        <option value="ml">ML</option>
                        <option value="piece">Piece</option>
                        <option value="packet">Packet</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>MRP *</label>
                    <input type="number" id="mrp" placeholder="250" required>
                </div>
                <div class="form-group">
                    <label>Selling Price *</label>
                    <input type="number" id="price" placeholder="240" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="50" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="groceries">Groceries</option>
                        <option value="snacks">Snacks</option>
                        <option value="beverages">Beverages</option>
                        <option value="dairy">Dairy</option>
                        <option value="personal-care">Personal Care</option>
                        <option value="household">Household</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3" placeholder="Product details..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fa fa-save"></i> Save Product
            </button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shopId');
        const itemId = urlParams.get('itemId');
        let isEdit = false;

        if (!shopId) {
            alert('Invalid shop link');
            window.history.back();
        }

        // Load existing item if editing
        if (itemId) {
            isEdit = true;
            document.getElementById('formTitle').innerText = 'Edit Product';
            loadItemData();
        }

        async function loadItemData() {
            try {
                const res = await fetch(`/api/local-market/products/${itemId}`);
                const item = await res.json();
                
                if (item._id) {
                    document.getElementById('itemId').value = item._id;
                    document.getElementById('name').value = item.name || '';
                    document.getElementById('weight').value = item.weight || '';
                    document.getElementById('unit').value = item.unit || 'kg';
                    document.getElementById('mrp').value = item.mrp || '';
                    document.getElementById('price').value = item.price || '';
                    document.getElementById('stock').value = item.stock || '';
                    document.getElementById('category').value = item.category || 'groceries';
                    document.getElementById('description').value = item.description || '';
                }
            } catch (err) {
                console.error(err);
                alert('Failed to load item');
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';

            const productData = {
                shopId: shopId,
                name: document.getElementById('name').value.trim(),
                weight: parseFloat(document.getElementById('weight').value),
                unit: document.getElementById('unit').value,
                mrp: parseFloat(document.getElementById('mrp').value),
                price: parseFloat(document.getElementById('price').value),
                stock: parseInt(document.getElementById('stock').value),
                category: document.getElementById('category').value,
                description: document.getElementById('description').value.trim(),
                available: true
            };

            try {
                const url = isEdit 
                    ? `/api/local-market/products/${itemId}`
                    : `/api/local-market/products`;
                
                const method = isEdit ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(productData)
                });

                const data = await res.json();

                if (data._id || data.success) {
                    alert('Product saved successfully!');
                    window.location.href = `/local-market/shop-templates/kirana/dashboard.html?shopId=${shopId}`;
                } else {
                    alert('Error: ' + (data.error || 'Failed to save'));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa fa-save"></i> Save Product';
                }
            } catch (err) {
                console.error(err);
                alert('Failed to save product');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-save"></i> Save Product';
            }
        });
    </script>
</body>
</html>
