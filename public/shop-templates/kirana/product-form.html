<div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="formTitle">Add Kirana Product</h2>
    <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-row">
            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="pName" required>
            </div>
            <div class="form-group">
                <label>Brand</label>
                <input type="text" id="pBrand">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Weight/Volume *</label>
                <input type="text" id="pWeight" placeholder="1kg, 500ml" required>
            </div>
            <div class="form-group">
                <label>Unit Type</label>
                <select id="pUnit">
                    <option value="kg">Kg</option>
                    <option value="g">Gram</option>
                    <option value="l">Litre</option>
                    <option value="ml">ML</option>
                    <option value="pcs">Pieces</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>MRP *</label>
                <input type="number" id="pMrp" required>
            </div>
            <div class="form-group">
                <label>Selling Price *</label>
                <input type="number" id="pPrice" required>
            </div>
            <div class="form-group">
                <label>Stock Quantity *</label>
                <input type="number" id="pStock" required>
            </div>
        </div>
        <div class="form-group">
            <label>Expiry Date</label>
            <input type="date" id="pExpiry">
        </div>
        <button type="submit" class="btn btn-success">Save Product</button>
    </form>
</div>
