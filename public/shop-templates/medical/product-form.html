<div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="formTitle">Add Medicine</h2>
    <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-row">
            <div class="form-group">
                <label>Medicine Name *</label>
                <input type="text" id="pName" required>
            </div>
            <div class="form-group">
                <label>Company *</label>
                <input type="text" id="pCompany" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Batch Number *</label>
                <input type="text" id="pBatch" required>
            </div>
            <div class="form-group">
                <label>Expiry Date *</label>
                <input type="date" id="pExpiry" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Drug Type *</label>
                <select id="pType" required>
                    <option value="tablet">Tablet</option>
                    <option value="syrup">Syrup</option>
                    <option value="injection">Injection</option>
                    <option value="ointment">Ointment</option>
                    <option value="drops">Drops</option>
                </select>
            </div>
            <div class="form-group">
                <label>Pack Size</label>
                <input type="text" id="pPack" placeholder="10 tablets, 100ml">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>MRP *</label>
                <input type="number" id="pMrp" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Selling Price *</label>
                <input type="number" id="pPrice" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Stock *</label>
                <input type="number" id="pStock" required>
            </div>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="pPrescription"> Prescription Required</label>
        </div>
        <button type="submit" class="btn btn-success">Save Medicine</button>
    </form>
</div>
