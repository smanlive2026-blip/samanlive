<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medicine - SAMANLIVE</title>
    <link rel="stylesheet" href="/local-market/assets/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
       .form-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
       .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e2e8f0;
        }
       .form-header h2 {
            margin: 0;
            font-size: 24px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
       .back-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #334155;
            font-weight: 600;
            transition: all 0.2s;
        }
       .back-btn:hover { background: #e2e8f0; transform: translateX(-2px); }
       .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
       .form-group {
            margin-bottom: 16px;
        }
       .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }
       .form-group input,
       .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s;
        }
       .form-group input:focus,
       .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
       .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
            margin-bottom: 20px;
        }
       .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
       .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: 600;
            color: #475569;
        }
       .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }
       .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16,185,129,0.4);
        }
       .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
       .expiry-warning {
            font-size: 12px;
            color: #ef4444;
            margin-top: 4px;
            display: none;
        }
        @media (max-width: 768px) {
           .form-row { grid-template-columns: 1fr; }
           .form-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2><i class="fa fa-pills"></i> <span id="formTitle">Add Medicine</span></h2>
            <button class="back-btn" onclick="goBack()">
                <i class="fa fa-arrow-left"></i> Back
            </button>
        </div>

        <form id="productForm">
            <input type="hidden" id="productId">
            <input type="hidden" id="shopId">

            <div class="form-row">
                <div class="form-group">
                    <label>Medicine Name *</label>
                    <input type="text" id="pName" placeholder="e.g. Paracetamol 500mg" required>
                </div>
                <div class="form-group">
                    <label>Company *</label>
                    <input type="text" id="pCompany" placeholder="e.g. Cipla, Sun Pharma" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Batch Number *</label>
                    <input type="text" id="pBatch" placeholder="e.g. BT2024001" required>
                </div>
                <div class="form-group">
                    <label>Expiry Date *</label>
                    <input type="date" id="pExpiry" required onchange="checkExpiry()">
                    <div class="expiry-warning" id="expiryWarning">⚠️ Expiry within 30 days!</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Drug Type *</label>
                    <select id="pType" required>
                        <option value="tablet">Tablet</option>
                        <option value="syrup">Syrup</option>
                        <option value="injection">Injection</option>
                        <option value="ointment">Ointment</option>
                        <option value="drops">Drops</option>
                        <option value="capsule">Capsule</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pack Size</label>
                    <input type="text" id="pPack" placeholder="e.g. 10 tablets, 100ml">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>MRP (₹) *</label>
                    <input type="number" id="pMrp" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Selling Price (₹) *</label>
                    <input type="number" id="pPrice" step="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="pStock" placeholder="0" required>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="pPrescription">
                <label for="pPrescription">Prescription Required</label>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="fa fa-save"></i> Save Medicine
            </button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shopId');
        const itemId = urlParams.get('itemId');
        const token = localStorage.getItem('userToken');
        let isEdit = false;

        if (!shopId) {
            alert('Invalid shop link');
            window.location.href = '/local-market/create-shop.html';
        }

        document.getElementById('shopId').value = shopId;

        // Load existing item if editing
        if (itemId) {
            isEdit = true;
            document.getElementById('formTitle').innerText = 'Edit Medicine';
            loadItemData(itemId);
        }

        function goBack() {
            window.location.href = `/local-market/shop-templates/medical/dashboard.html?shopId=${shopId}`;
        }

        function checkExpiry() {
            const expiryInput = document.getElementById('pExpiry');
            const warning = document.getElementById('expiryWarning');
            const expiryDate = new Date(expiryInput.value);
            const today = new Date();
            const diffDays = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));

            if (diffDays < 30 && diffDays > 0) {
                warning.style.display = 'block';
            } else {
                warning.style.display = 'none';
            }
        }

        async function loadItemData(id) {
            try {
                const res = await fetch(`/api/local-market/products/${id}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const item = await res.json();

                document.getElementById('productId').value = item._id;
                document.getElementById('pName').value = item.name || '';
                document.getElementById('pCompany').value = item.company || '';
                document.getElementById('pBatch').value = item.batch || '';
                document.getElementById('pExpiry').value = item.expiry? item.expiry.split('T')[0] : '';
                document.getElementById('pType').value = item.drugType || 'tablet';
                document.getElementById('pPack').value = item.packSize || '';
                document.getElementById('pMrp').value = item.mrp || '';
                document.getElementById('pPrice').value = item.price || '';
                document.getElementById('pStock').value = item.stock || 0;
                document.getElementById('pPrescription').checked = item.prescriptionRequired || false;

                checkExpiry();
            } catch (err) {
                alert('Failed to load medicine: ' + err.message);
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';

            const productData = {
                shopId: shopId,
                name: document.getElementById('pName').value.trim(),
                company: document.getElementById('pCompany').value.trim(),
                batch: document.getElementById('pBatch').value.trim(),
                expiry: document.getElementById('pExpiry').value,
                drugType: document.getElementById('pType').value,
                packSize: document.getElementById('pPack').value.trim(),
                mrp: parseFloat(document.getElementById('pMrp').value),
                price: parseFloat(document.getElementById('pPrice').value),
                stock: parseInt(document.getElementById('pStock').value),
                prescriptionRequired: document.getElementById('pPrescription').checked,
                available: true
            };

            try {
                const url = isEdit
                   ? `/api/local-market/products/${itemId}`
                    : '/api/local-market/products';

                const method = isEdit? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(productData)
                });

                const data = await res.json();

                if (res.ok) {
                    alert(isEdit? '✅ Medicine updated successfully!' : '✅ Medicine added successfully!');
                    goBack();
                } else {
                    alert('Error: ' + (data.error || data.message || 'Failed to save'));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa fa-save"></i> Save Medicine';
                }
            } catch (err) {
                alert('Failed to save: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-save"></i> Save Medicine';
            }
        });
    </script>
</body>
</html>
