<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloth Shop Dashboard - SAMANLIVE</title>
    <link rel="stylesheet" href="/local-market/assets/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
        }
        .shop-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px;
        }
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #334155;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #e2e8f0; transform: translateX(-2px); }
        .shop-title-wrap h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
        }
        .shop-type-label {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: #64748b;
        }
        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.active, .badge.approved { background: #dcfce7; color: #166534; }
        .badge.pending { background: #fef3c7; color: #92400e; }
        .badge.rejected { background: #fee2e2; color: #991b1b; }
        .badge.inactive { background: #e5e7eb; color: #374151; }

        /* Stats Grid - Chote Dabbe */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .stat-card .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.9;
        }
        .stat-card h3 {
            margin: 0 0 4px 0;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card p {
            margin: 0;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
        }

        .content-area {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .content-area h3 {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16,185,129,0.4);
        }
        .btn-secondary { 
            background: rgba(255,255,255,0.95);
            color: #334155;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary:hover { background: white; transform: translateY(-2px); }
        .btn-danger { 
            background: #ef4444; 
            color: white;
            box-shadow: 0 4px 12px rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .data-table th {
            text-align: left;
            padding: 12px 16px;
            color: #475569;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .data-table td {
            padding: 16px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-table td:first-child {
            border-left: 1px solid #e2e8f0;
            border-radius: 10px 0 0 10px;
        }
        .data-table td:last-child {
            border-right: 1px solid #e2e8f0;
            border-radius: 0 10px 10px 0;
        }
        .data-table tr:hover td {
            background: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 64px;
            color: #cbd5e1;
            margin-bottom: 16px;
        }
        .empty-state h4 {
            margin: 0 0 8px 0;
            color: #475569;
            font-size: 18px;
        }
        .empty-state p {
            margin: 0 0 20px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .table-responsive { overflow-x: auto; }
        .size-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            background: #e0e7ff;
            color: #3730a3;
            margin: 2px;
            display: inline-block;
        }
        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin: 2px;
            border: 2px solid #e2e8f0;
        }

        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            border: 4px solid rgba(255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* ✅ Dynamic location indicator */
        .location-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #dcfce7;
            color: #166534;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .location-status.inactive {
            background: #f1f5f9;
            color: #64748b;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* ✅ Map styles */
        .map-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .shop-map-icon {
            background: none;
            border: none;
        }
    </style>
</head>
<body>
    <div class="shop-container">
        <div class="shop-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fa fa-arrow-left"></i>
                </button>
                <div class="shop-title-wrap">
                    <h1 id="shopName">Loading...</h1>
                    <p class="shop-type-label">
                        Cloth Store 
                        <span id="locationTypeBadge"></span>
                    </p>
                </div>
            </div>
            <span class="badge" id="shopStatus">Loading</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👗</div>
                <h3 id="totalItems">0</h3>
                <p>Total Items</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <h3 id="totalStock">0</h3>
                <p>Total Stock</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <h3 id="todayOrders">0</h3>
                <p>Today Orders</p>
            </div>
        </div>

        <!-- ✅ NEW: Map Container -->
        <div class="map-container">
            <h3 style="margin: 0 0 12px 0; font-size: 18px; color: #1e293b;">
                <i class="fa fa-map-marker-alt"></i> Shop Coverage Area
                <small id="rangeText" style="font-weight: normal; color: #64748b; font-size: 14px;"></small>
            </h3>
            <div id="shopMapContainer" style="width: 100%; height: 250px; border-radius: 12px; overflow: hidden; border: 2px solid #e2e8f0; cursor: pointer;" onclick="expandMap()"></div>
            <p style="font-size: 12px; color: #64748b; margin-top: 8px; text-align: center;">
                <i class="fa fa-info-circle"></i> Click map to expand • <span id="locationUpdateText">Static location</span>
            </p>
        </div>

        <div class="action-bar">
            <button class="btn btn-primary" id="addProductBtn">
                <i class="fa fa-plus"></i> Add Garment
            </button>
            <button class="btn btn-secondary" onclick="loadOrders()">
                <i class="fa fa-list"></i> View Orders
            </button>
            <button class="btn btn-secondary" onclick="editShopInfo()">
                <i class="fa fa-edit"></i> Edit Shop
            </button>
        </div>

        <div class="content-area">
            <h3><i class="fa fa-tshirt"></i> Garments</h3>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Category</th>
                            <th>Size</th>
                            <th>Color</th>
                            <th>Fabric</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr>
                            <td colspan="8">
                                <div class="empty-state">
                                    <i class="fa fa-tshirt"></i>
                                    <h4>No Garments Yet</h4>
                                    <p>Start by adding your first garment to the shop</p>
                                    <button class="btn btn-primary" onclick="document.getElementById('addProductBtn').click()">
                                        <i class="fa fa-plus"></i> Add First Garment
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shopId');
        let currentShop = null;
        let locationInterval = null;
        let shopMap = null;
        let shopMarker = null;
        let rangeCircle = null;
        let lastSentLocation = null;

        if (!shopId) {
            alert('Invalid shop link');
            window.location.href = '/local-market/create-shop.html';
        }

        async function loadShopData() {
            try {
                const res = await fetch(`/api/local-market/shops/${shopId}`);
                const shop = await res.json();

                if (!shop._id) {
                    alert('Shop not found');
                    window.location.href = '/local-market/create-shop.html';
                    return;
                }

                currentShop = shop;
                document.getElementById('shopName').innerText = shop.shopName;
                
                const statusEl = document.getElementById('shopStatus');
                statusEl.innerText = shop.status.toUpperCase();
                statusEl.className = 'badge ' + shop.status;

                // ✅ Show location type badge
                const locationBadge = document.getElementById('locationTypeBadge');
                const rangeText = document.getElementById('rangeText');
                const locationUpdateText = document.getElementById('locationUpdateText');
                
                if (shop.locationType === 'dynamic') {
                    locationBadge.innerHTML = `<span class="location-status"><span class="pulse-dot"></span>Dynamic Location</span>`;
                    rangeText.textContent = `(${shop.range/1000} KM Radius)`;
                    locationUpdateText.textContent = 'Updates every 50m movement';
                } else {
                    locationBadge.innerHTML = `<span class="location-status inactive">Static Location</span>`;
                    rangeText.textContent = `(${shop.range/1000} KM Radius)`;
                    locationUpdateText.textContent = 'Fixed location';
                }

                const items = shop.items || shop.products || [];
                const totalStock = items.reduce((sum, i) => sum + (i.stock || 0), 0);
                
                document.getElementById('totalItems').innerText = items.length;
                document.getElementById('totalStock').innerText = totalStock;
                document.getElementById('todayOrders').innerText = shop.todayOrders || 0;

                loadItems(items);
                document.getElementById('loader').style.display = 'none';

                // ✅ Initialize map
                initShopMap();

                // ✅ Start dynamic location tracking if needed
                startDynamicLocationTracking();

            } catch (err) {
                console.error(err);
                alert('Failed to load shop: ' + err.message);
                document.getElementById('loader').style.display = 'none';
            }
        }

        // ✅ Initialize map with circle
        function initShopMap() {
            if (!currentShop.location ||!currentShop.location.coordinates) return;

            const [lng, lat] = currentShop.location.coordinates;
            const range = currentShop.range || 5000;

            shopMap = L.map('shopMapContainer').setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(shopMap);

            // Shop marker
            shopMarker = L.marker([lat, lng], {
                icon: L.divIcon({
                    html: `<div style="font-size: 24px;">${currentShop.icon || '👗'}</div>`,
                    className: 'shop-map-icon',
                    iconSize: [30, 30]
                })
            }).addTo(shopMap).bindPopup(`<b>${currentShop.shopName}</b><br>Range: ${range/1000} KM`);

            // Range circle
            rangeCircle = L.circle([lat, lng], {
                color: '#10b981',
                fillColor: '#10b981',
                fillOpacity: 0.1,
                radius: range
            }).addTo(shopMap);
        }

        // ✅ Expand map full screen
        function expandMap() {
            if (!shopMap) return;

            const modal = document.createElement('div');
            modal.id = 'mapModal';
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.9); z-index: 9999; display: flex;
                align-items: center; justify-content: center;
            `;
            modal.innerHTML = `
                <div style="position: relative; width: 95%; max-width: 1000px; height: 80%;">
                    <button onclick="closeMapModal()" style="position: absolute; top: -40px; right: 0; background: white; border: none; font-size: 30px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10000;">×</button>
                    <div id="expandedMap" style="width: 100%; height: 100%; border-radius: 12px;"></div>
                </div>
            `;
            document.body.appendChild(modal);

            const [lng, lat] = currentShop.location.coordinates;
            const expandedMap = L.map('expandedMap').setView([lat, lng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(expandedMap);
            L.marker([lat, lng], {
                icon: L.divIcon({
                    html: `<div style="font-size: 32px;">${currentShop.icon || '👗'}</div>`,
                    className: 'shop-map-icon',
                    iconSize: [40, 40]
                })
            }).addTo(expandedMap).bindPopup(`<b>${currentShop.shopName}</b><br>Range: ${currentShop.range/1000} KM`).openPopup();
            L.circle([lat, lng], {
                color: '#10b981',
                fillColor: '#10b981',
                fillOpacity: 0.15,
                radius: currentShop.range || 5000
            }).addTo(expandedMap);

            modal.onclick = (e) => { if (e.target === modal) closeMapModal(); };
        }

        function closeMapModal() {
            const modal = document.getElementById('mapModal');
            if (modal) modal.remove();
        }

        // ✅ Dynamic location tracking - 50m update
        function startDynamicLocationTracking() {
            if (!currentShop || currentShop.locationType!== 'dynamic') {
                console.log('📍 Shop is static, no location tracking needed');
                return;
            }

            if (locationInterval) clearInterval(locationInterval);

            console.log('🚶 Starting dynamic location tracking for shop:', currentShop.shopName);

            // Update immediately once
            updateShopLocation();

            // Then update every 30 seconds
            locationInterval = setInterval(updateShopLocation, 30000);
        }

        function updateShopLocation() {
            if (!navigator.geolocation) {
                console.error('Geolocation not supported');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const newLat = pos.coords.latitude;
                    const newLng = pos.coords.longitude;

                    // Check if moved 50m from last sent location
                    if (lastSentLocation) {
                        const distance = calculateDistance(
                            lastSentLocation.lat, lastSentLocation.lng,
                            newLat, newLng
                        );
                        if (distance < 50) return; // Skip if less than 50m
                    }

                    console.log('📍 Location changed:', newLat, newLng);
                    lastSentLocation = { lat: newLat, lng: newLng };

                    // Update backend
                    await updateShopLocationToServer(newLng, newLat);

                    // Update map
                    if (shopMap && shopMarker && rangeCircle) {
                        shopMarker.setLatLng([newLat, newLng]);
                        rangeCircle.setLatLng([newLat, newLng]);
                        shopMap.setView([newLat, newLng]);
                    }
                },
                (err) => {
                    console.error('Geolocation error:', err);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        async function updateShopLocationToServer(lng, lat) {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch(`/api/local-market/shops/${shopId}/update-location`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        coordinates: [lng, lat]
                    })
                });

                if (res.ok) {
                    console.log('✅ Location synced to server');
                    // Update local data
                    currentShop.location.coordinates = [lng, lat];
                }
            } catch (err) {
                console.error('Location sync failed:', err);
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // meters
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function loadItems(items) {
            const tbody = document.getElementById('productTableBody');
            
            if (!items || items.length === 0) {
                tbody.innerHTML = `<tr>
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="fa fa-tshirt"></i>
                            <h4>No Garments Yet</h4>
                            <p>Start by adding your first garment to the shop</p>
                            <button class="btn btn-primary" onclick="document.getElementById('addProductBtn').click()">
                                <i class="fa fa-plus"></i> Add First Garment
                            </button>
                        </div>
                    </td>
                </tr>`;
                return;
            }

            tbody.innerHTML = items.map(item => {
                const sizes = (item.sizes || [item.size]).filter(Boolean);
                const colors = (item.colors || [item.color]).filter(Boolean);
                
                return `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.category || '-'}</td>
                    <td>${sizes.map(s => `<span class="size-badge">${s}</span>`).join('')}</td>
                    <td>${colors.map(c => `<span class="color-dot" style="background:${c.toLowerCase()}" title="${c}"></span>`).join('')}</td>
                    <td>${item.fabric || '-'}</td>
                    <td><strong>₹${item.price}</strong></td>
                    <td>${item.stock || 0}</td>
                    <td>
                        <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">
                            <i class="fa fa-edit"></i>
                        </button>
                        <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">
                            <i class="fa fa-trash"></i>
                        </button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        document.getElementById('addProductBtn').onclick = function() {
            window.location.href = `/shop-templates/cloth/product-form.html?shopId=${shopId}`;
        };

        function editShopInfo() {
            window.location.href = `/local-market/edit-shop.html?shopId=${shopId}`;
        }

        function loadOrders() {
            window.location.href = `/local-market/orders.html?shopId=${shopId}`;
        }

        function editItem(itemId) {
            window.location.href = `/shop-templates/cloth/product-form.html?shopId=${shopId}&itemId=${itemId}`;
        }

        async function deleteItem(itemId) {
            if (!confirm('Delete this item?')) return;
            try {
                await fetch(`/api/local-market/products/${itemId}`, {
                    method: 'DELETE'
                });
                alert('Item deleted!');
                loadShopData();
            } catch (err) {
                alert('Failed to delete: ' + err.message);
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (locationInterval) clearInterval(locationInterval);
        });

        loadShopData();
    </script>
</body>
</html>
