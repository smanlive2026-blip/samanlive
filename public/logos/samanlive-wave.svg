<!-- Link: /logos/samanlive-wave.svg -->  
<!-- Use: <img src="/logos/samanlive-wave.svg" height="40"> -->
<svg width="155" height="40" viewBox="0 0 155 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Letters Wave Animation -->
  <text x="0" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#3b82f6">S
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0s" repeatCount="indefinite"/>
  </text>
  <text x="16" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#3b82f6">A
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.1s" repeatCount="indefinite"/>
  </text>
  <text x="32" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#3b82f6">M
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
  </text>
  <text x="52" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#3b82f6">N
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
  </text>
  <text x="72" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#10b981">L
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
  </text>
  <text x="84" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#10b981">I
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.5s" repeatCount="indefinite"/>
  </text>
  <text x="92" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#10b981">V
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
  </text>
  <text x="108" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#10b981">E
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -3; 0 0" dur="1.2s" begin="0.7s" repeatCount="indefinite"/>
  </text>
  
  <!-- Tracking Dot -->
  <circle cx="145" cy="20" r="2" fill="#f59e0b">
    <animate attributeName="r" values="2;4;2" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>