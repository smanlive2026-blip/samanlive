<!-- Link: /logos/samanlive-pulse.svg -->  
<!-- Use: <img src="/logos/samanlive-pulse.svg" height="40"> -->
<svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  
  <!-- Text -->
  <text x="0" y="28" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="url(#grad1)">SAMNLIVE</text>
  
  <!-- Pulse Ring - Tracking Concept -->
  <circle cx="148" cy="20" r="6" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6">
    <animate attributeName="r" values="6;12;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="148" cy="20" r="3" fill="#10b981"/>
</svg>