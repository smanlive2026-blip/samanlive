<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Details - SAMANLIVE</title>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
.details-page {
    min-height: 100vh;
    background: #f1f5f9;
    padding-bottom: 40px;
}
.header-bar {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 16px 20px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-bar.back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin-right: 12px;
}
.header-bar h1 {
    display: inline-block;
    font-size: 20px;
    margin: 0;
}
.form-container {
    margin: 20px;
    background: white;
    padding: 24px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.profile-pic-section {
    text-align: center;
    margin-bottom: 24px;
}
.profile-pic-wrapper {
    position: relative;
    display: inline-block;
}
.profile-pic-wrapper img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid #667eea;
    object-fit: cover;
}
.camera-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    background: #667eea;
    color: white;
    border: 3px solid white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 8px;
}
.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 15px;
    box-sizing: border-box;
    transition: all 0.2s;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
}
.form-group textarea {
    resize: vertical;
    min-height: 80px;
}
.location-box {
    background: #f8fafc;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 20px;
}
.location-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.location-header h3 {
    margin: 0;
    font-size: 16px;
    color: #1e293b;
}
/* ✅ NAYA: Auto status badge */
.auto-badge {
    background: #10b981;
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.auto-badge.pulse {
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
.location-coords {
    font-size: 13px;
    color: #64748b;
    margin-top: 8px;
}
.location-coords.success {
    color: #10b981;
    font-weight: 600;
}
.location-info {
    font-size: 12px;
    color: #64748b;
    margin-top: 8px;
    padding: 8px;
    background: #e0f2fe;
    border-radius: 6px;
}
.save-btn {
    width: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
}
.save-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
.success-msg {
    background: #d1fae5;
    color: #065f46;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    text-align: center;
    display: none;
}
@media (max-width: 768px) {
.form-container {
        margin: 16px;
        padding: 20px;
    }
}
</style>
</head>
<body>
<div class="details-page">
    <div class="header-bar">
        <button class="back-btn" onclick="window.location.href='/profile.html'">← Back</button>
        <h1>My Details</h1>
    </div>

    <div class="form-container">
        <div class="success-msg" id="successMsg">✅ Details Updated Successfully!</div>

        <div class="profile-pic-section">
            <div class="profile-pic-wrapper">
                <img id="userProfilePic" src="/assets/default-avatar.png" alt="Profile">
                <button class="camera-btn" onclick="document.getElementById('picInput').click()">📷</button>
                <input type="file" id="picInput" accept="image/*" style="display:none" onchange="handlePicChange(event)">
            </div>
        </div>

        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="userName" placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="userEmail" placeholder="your@email.com">
        </div>

        <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="userPhone" placeholder="10 digit mobile" maxlength="10">
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea id="userAddress" placeholder="House No, Street, Area"></textarea>
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" id="userCity" placeholder="City">
        </div>

        <div class="form-group">
            <label>Pincode</label>
            <input type="text" id="userPincode" placeholder="6 digit pincode" maxlength="6">
        </div>

        <div class="form-group">
            <label>Language</label>
            <select id="userLang">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="location-box">
            <div class="location-header">
                <h3>📍 Current Location</h3>
                <!-- ✅ NAYA: Auto badge, button hata diya -->
                <div class="auto-badge">
                    <span class="pulse"></span>
                    AUTO SYNC
                </div>
            </div>
            <div class="location-coords" id="locationCoords">
                Loading your current location...
            </div>
            <div class="location-info">
                💡 Your location is automatically updated from your device every 30 seconds
            </div>
            <input type="hidden" id="userLat">
            <input type="hidden" id="userLng">
        </div>

        <button class="save-btn" onclick="saveDetails()" id="saveBtn">Save Details</button>
    </div>
</div>

<script>
let currentUser = null;
let newProfilePic = null;

// Load user data
window.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('userToken');
    if (!token) {
        window.location.href = '/';
        return;
    }

    try {
        const res = await fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
            currentUser = data.user;
            loadUserData();
        } else {
            localStorage.removeItem('userToken');
            window.location.href = '/';
        }
    } catch (err) {
        window.location.href = '/';
    }

    // ✅ NAYA: Auto fill location from global
    autoFillLocation();
});

function loadUserData() {
    document.getElementById('userName').value = currentUser.name || '';
    document.getElementById('userEmail').value = currentUser.email || '';
    document.getElementById('userPhone').value = currentUser.phone || '';
    document.getElementById('userAddress').value = currentUser.address?.street || '';
    document.getElementById('userCity').value = currentUser.address?.city || '';
    document.getElementById('userPincode').value = currentUser.address?.pincode || '';
    document.getElementById('userLang').value = currentUser.language || 'hi';
    document.getElementById('userProfilePic').src = currentUser.profilePic || '/assets/default-avatar.png';

    if (currentUser.location?.coordinates) {
        const lat = currentUser.location.coordinates[1];
        const lng = currentUser.location.coordinates[0];
        updateLocationUI(lat, lng, false);
    }
}

// ✅ NAYA: Auto fill location from global
function autoFillLocation() {
    const coordsEl = document.getElementById('locationCoords');

    if (window.currentUserLocation) {
        const lat = window.currentUserLocation.lat;
        const lng = window.currentUserLocation.lng;
        updateLocationUI(lat, lng, true);
    } else {
        coordsEl.innerHTML = '⏳ Waiting for location... Make sure GPS is enabled';
        // 2 sec baad fir check karo
        setTimeout(() => {
            if (window.currentUserLocation) {
                autoFillLocation();
            } else {
                coordsEl.innerHTML = '❌ Location not available. Please enable GPS in app settings';
            }
        }, 2000);
    }
}

function updateLocationUI(lat, lng, isAuto = false) {
    document.getElementById('userLat').value = lat;
    document.getElementById('userLng').value = lng;
    const coordsEl = document.getElementById('locationCoords');
    coordsEl.innerHTML = `
        <strong>Lat:</strong> ${lat.toFixed(6)}<br>
        <strong>Lng:</strong> ${lng.toFixed(6)}
        ${isAuto? '<br><small style="color:#10b981;">✅ Auto-updated from current location</small>' : ''}
    `;
    coordsEl.classList.add('success');
}

function handlePicChange(event) {
    const file = event.target.files[0];
    if (file) {
        newProfilePic = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('userProfilePic').src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
}

// ✅ PURANA getCurrentLocation() function HATA DIYA

async function saveDetails() {
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saving...';
    btn.disabled = true;

    const token = localStorage.getItem('userToken');
    const lat = document.getElementById('userLat').value;
    const lng = document.getElementById('userLng').value;

    const data = {
        name: document.getElementById('userName').value.trim(),
        email: document.getElementById('userEmail').value.trim(),
        phone: document.getElementById('userPhone').value.trim(),
        address: {
            street: document.getElementById('userAddress').value.trim(),
            city: document.getElementById('userCity').value.trim(),
            pincode: document.getElementById('userPincode').value.trim()
        },
        language: document.getElementById('userLang').value,
        location: lat && lng? {
            type: 'Point',
            coordinates: [parseFloat(lng), parseFloat(lat)]
        } : undefined
    };

    if (!data.name ||!data.phone) {
        alert('Name and Phone are required!');
        btn.textContent = 'Save Details';
        btn.disabled = false;
        return;
    }

    try {
        const res = await fetch('/api/user/update', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(data)
        });
        const result = await res.json();

        if (result.success) {
            document.getElementById('successMsg').style.display = 'block';
            setTimeout(() => {
                document.getElementById('successMsg').style.display = 'none';
            }, 3000);
            currentUser = result.user;
        } else {
            alert('Update failed: ' + result.error);
        }
    } catch (err) {
        alert('Update failed. Please try again.');
    }

    btn.textContent = 'Save Details';
    btn.disabled = false;
}
</script>
</body>
</html>
