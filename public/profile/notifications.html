<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wishlist - SAMANLIVE</title>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
.wishlist-page {
    min-height: 100vh;
    background: #f1f5f9;
    padding-bottom: 40px;
}
.header-bar {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 16px 20px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-bar .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin-right: 12px;
}
.header-bar h1 {
    display: inline-block;
    font-size: 20px;
    margin: 0;
}
.header-bar .count {
    float: right;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 14px;
}
.wishlist-container {
    margin: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
}
.wishlist-item {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    position: relative;
    transition: all 0.2s;
}
.wishlist-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}
.wishlist-img-wrapper {
    position: relative;
    padding-top: 100%;
    background: #f8fafc;
}
.wishlist-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.heart-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: white;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.discount-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #ef4444;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
}
.wishlist-details {
    padding: 12px;
}
.wishlist-name {
    font-size: 14px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.wishlist-price {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 8px;
}
.current-price {
    font-size: 18px;
    font-weight: 700;
    color: #1e293b;
}
.old-price {
    font-size: 13px;
    color: #94a3b8;
    text-decoration: line-through;
}
.wishlist-shop {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 10px;
}
.add-cart-btn {
    width: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}
.empty-state {
    text-align: center;
    padding: 80px 20px;
    grid-column: 1 / -1;
}
.empty-state .icon {
    font-size: 64px;
    margin-bottom: 16px;
}
.empty-state h2 {
    color: #1e293b;
    margin-bottom: 8px;
}
.empty-state p {
    color: #64748b;
    margin-bottom: 20px;
}
.shop-now-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}
.loading-state {
    text-align: center;
    padding: 60px 20px;
    grid-column: 1 / -1;
    color: #64748b;
}
@media (max-width: 768px) {
   .wishlist-container {
        margin: 16px;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }
}
</style>
</head>
<body>
<div class="wishlist-page">
    <div class="header-bar">
        <button class="back-btn" onclick="window.location.href='/profile.html'">← Back</button>
        <h1>Wishlist</h1>
        <span class="count" id="wishlistCount">0 items</span>
    </div>

    <div class="wishlist-container" id="wishlistContainer">
        <div class="loading-state">Loading wishlist...</div>
    </div>
</div>
<script src="/assets/js/app.js"></script>
<script>
let allWishlistItems = [];

// Load wishlist
window.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('userToken');
    if (!token) {
        window.location.href = '/';
        return;
    }
    await loadWishlist();
});

async function loadWishlist() {
    const token = localStorage.getItem('userToken');
    try {
        const res = await fetch('/api/user/wishlist', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
            allWishlistItems = data.items || [];
            renderWishlist();
        } else {
            showEmptyState();
        }
    } catch (err) {
        console.error('Failed to load wishlist:', err);
        showEmptyState();
    }
}

function renderWishlist() {
    const container = document.getElementById('wishlistContainer');
    document.getElementById('wishlistCount').textContent = `${allWishlistItems.length} items`;

    if (allWishlistItems.length === 0) {
        showEmptyState();
        return;
    }

    container.innerHTML = allWishlistItems.map(item => {
        const discount = item.oldPrice ? Math.round((1 - item.price / item.oldPrice) * 100) : 0;
        return `
            <div class="wishlist-item">
                <div class="wishlist-img-wrapper">
                    <img src="${item.image || '/assets/default-product.png'}" class="wishlist-img" alt="${item.name}">
                    ${discount > 0 ? `<div class="discount-badge">${discount}% OFF</div>` : ''}
                    <button class="heart-btn" onclick="removeFromWishlist('${item._id}')">❤️</button>
                </div>
                <div class="wishlist-details">
                    <div class="wishlist-name">${item.name}</div>
                    <div class="wishlist-price">
                        <span class="current-price">₹${item.price}</span>
                        ${item.oldPrice ? `<span class="old-price">₹${item.oldPrice}</span>` : ''}
                    </div>
                    <div class="wishlist-shop">🏪 ${item.shopName || 'SAMANLIVE Store'}</div>
                    <button class="add-cart-btn" onclick="addToCart('${item._id}')">Add to Cart</button>
                </div>
            </div>
        `;
    }).join('');
}

function showEmptyState() {
    document.getElementById('wishlistContainer').innerHTML = `
        <div class="empty-state">
            <div class="icon">❤️</div>
            <h2>Your Wishlist is Empty</h2>
            <p>Save items you love to buy them later</p>
            <button class="shop-now-btn" onclick="window.location.href='/'">Start Shopping</button>
        </div>
    `;
    document.getElementById('wishlistCount').textContent = '0 items';
}

async function removeFromWishlist(itemId) {
    if (!confirm('Remove from wishlist?')) return;

    const token = localStorage.getItem('userToken');
    try {
        const res = await fetch(`/api/user/wishlist/${itemId}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.success) {
            await loadWishlist();
        } else {
            alert('Failed to remove item');
        }
    } catch (err) {
        alert('Failed to remove item');
    }
}

async function addToCart(itemId) {
    const token = localStorage.getItem('userToken');
    try {
        const res = await fetch('/api/cart/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ productId: itemId, quantity: 1 })
        });
        const data = await res.json();
        if (data.success) {
            alert('✅ Added to cart!');
        } else {
            alert('Failed to add to cart');
        }
    } catch (err) {
        alert('Failed to add to cart');
    }
}
</script>
</body>
</html>
