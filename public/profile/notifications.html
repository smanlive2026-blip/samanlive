<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notifications - SAMANLIVE</title>
<link rel="stylesheet" href="/assets/css/main.css">
<style>
.notifications-page {
    min-height: 100vh;
    background: #f8fafc;
    padding-bottom: 80px;
}

/* Header */
.header-bar {
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 16px 20px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}
.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}
.header-bar .back-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
}
.header-bar h1 {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
}
.header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
}
.header-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
}
.header-btn:hover {
    background: rgba(255,255,255,0.3);
}
.unread-badge {
    background: #ef4444;
    color: white;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
}

/* Filter Tabs */
.filter-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
}
.filter-tabs::-webkit-scrollbar {
    display: none;
}
.filter-tab {
    background: rgba(255,255,255,0.15);
    border: none;
    color: rgba(255,255,255,0.9);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
}
.filter-tab.active {
    background: white;
    color: #667eea;
}
.filter-tab .count {
    background: rgba(0,0,0,0.2);
    padding: 2px 6px;
    border-radius: 8px;
    margin-left: 4px;
    font-size: 11px;
}
.filter-tab.active .count {
    background: #667eea;
    color: white;
}

/* Container */
.notifications-container {
    padding: 20px;
}

/* Notification Card */
.notification-item {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    display: flex;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    border: 2px solid transparent;
}
.notification-item:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
}
.notification-item.unread {
    background: #f0f9ff;
    border-color: #dbeafe;
}
.notification-item.priority-high {
    border-left: 4px solid #ef4444;
}
.notification-item.priority-medium {
    border-left: 4px solid #f59e0b;
}

.notification-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
}
.notification-icon.order { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
.notification-icon.promo { background: linear-gradient(135deg, #fef3c7, #fde68a); }
.notification-icon.delivery { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
.notification-icon.system { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }
.notification-icon.area { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
.notification-icon.admin { background: linear-gradient(135deg, #ffedd5, #fed7aa); }

.notification-content {
    flex: 1;
    min-width: 0;
}
.notification-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 6px;
}
.notification-title {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    line-height: 1.3;
}
.priority-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.priority-tag.high {
    background: #fee2e2;
    color: #dc2626;
}
.priority-tag.medium {
    background: #fef3c7;
    color: #d97706;
}
.notification-text {
    font-size: 14px;
    color: #475569;
    margin-bottom: 8px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.notification-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: #94a3b8;
}
.notification-time {
    display: flex;
    align-items: center;
    gap: 4px;
}
.notification-source {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: #f1f5f9;
    border-radius: 6px;
    font-weight: 600;
}
.notification-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
}
.action-btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-primary {
    background: #667eea;
    color: white;
}
.btn-secondary {
    background: #f1f5f9;
    color: #475569;
}
.delete-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #fee2e2;
    border: none;
    color: #dc2626;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.2s;
}
.notification-item:hover .delete-btn {
    opacity: 1;
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 80px 20px;
}
.empty-state .icon {
    font-size: 72px;
    margin-bottom: 16px;
    opacity: 0.5;
}
.empty-state h2 {
    color: #1e293b;
    margin-bottom: 8px;
    font-size: 20px;
}
.empty-state p {
    color: #64748b;
    font-size: 14px;
}
.loading-state {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
}
.loading-spinner {
    border: 3px solid #f1f5f9;
    border-top: 3px solid #667eea;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Mobile */
@media (max-width: 768px) {
    .notifications-container {
        padding: 16px;
    }
    .notification-item {
        padding: 14px;
    }
    .notification-icon {
        width: 44px;
        height: 44px;
        font-size: 22px;
    }
}
</style>
</head>
<body>
<div class="notifications-page">
    <!-- Header -->
    <div class="header-bar">
        <div class="header-top">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/profile.html'">← Back</button>
                <h1>Notifications</h1>
            </div>
            <div class="header-actions">
                <span class="unread-badge" id="unreadBadge" style="display:none;">0</span>
                <button class="header-btn" onclick="markAllAsRead()">Mark all read</button>
            </div>
        </div>
        
        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all" onclick="filterNotifications('all')">
                All <span class="count" id="countAll">0</span>
            </button>
            <button class="filter-tab" data-filter="order" onclick="filterNotifications('order')">
                Orders <span class="count" id="countOrder">0</span>
            </button>
            <button class="filter-tab" data-filter="delivery" onclick="filterNotifications('delivery')">
                Delivery <span class="count" id="countDelivery">0</span>
            </button>
            <button class="filter-tab" data-filter="promo" onclick="filterNotifications('promo')">
                Offers <span class="count" id="countPromo">0</span>
            </button>
            <button class="filter-tab" data-filter="area" onclick="filterNotifications('area')">
                Area <span class="count" id="countArea">0</span>
            </button>
            <button class="filter-tab" data-filter="system" onclick="filterNotifications('system')">
                System <span class="count" id="countSystem">0</span>
            </button>
        </div>
    </div>

    <!-- Notifications List -->
    <div class="notifications-container" id="notificationsContainer">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading notifications...</p>
        </div>
    </div>
</div>

<script src="/assets/js/app.js"></script>
<script src="/assets/js/notifications.js"></script>
</body>
</html>
