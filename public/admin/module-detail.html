<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Management - SAMANLIVE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; }
        .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 20px 0; }
        .module-badge { font-size: 40px; }
        .tab-content { background: white; border-radius: 0 0 10px 10px; padding: 20px; }
        .area-card { border: 2px solid #e5e7eb; border-radius: 10px; padding: 15px; margin-bottom: 10px; }
        .area-card.active { border-color: #10b981; background: #f0fdf4; }
        .category-row { border-bottom: 1px solid #e5e7eb; padding: 12px 0; }
        .form-switch .form-check-input { width: 3em; height: 1.5em; }
        .cat-icon { font-size: 24px; width: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <a href="/admin.html" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
                    <span class="module-badge" id="moduleIcon">📦</span>
                    <div>
                        <h3 class="mb-0" id="moduleName">Loading...</h3>
                        <small id="moduleDesc"></small>
                    </div>
                </div>
                <div id="moduleStatus"></div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <ul class="nav nav-tabs" id="moduleTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#areasTab">
                    <i class="bi bi-geo-alt"></i> Active Areas
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#categoriesTab">
                    <i class="bi bi-grid"></i> Categories <span class="badge bg-secondary" id="catCount">0</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- TAB 1: AREAS -->
            <div class="tab-pane fade show active" id="areasTab">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Module Kis Area Me Active Hai</h5>
                    <button class="btn btn-primary btn-sm" onclick="saveModuleAreas()">
                        <i class="bi bi-save"></i> Save Areas
                    </button>
                </div>
                <div id="areasList">Loading areas...</div>
            </div>

            <!-- TAB 2: CATEGORIES -->
            <div class="tab-pane fade" id="categoriesTab">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5>Module Categories</h5>
                    <button class="btn btn-success btn-sm" onclick="showAddCategoryModal()">
                        <i class="bi bi-plus-circle"></i> Add Category
                    </button>
                </div>
                <div id="categoriesList">Loading categories...</div>
            </div>
        </div>
    </div>

    <!-- Add Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Category Name *</label>
                        <input type="text" class="form-control" id="catName" placeholder="Grocery Store">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Icon</label>
                            <input type="text" class="form-control" id="catIcon" value="📦" maxlength="2">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Color</label>
                            <input type="color" class="form-control" id="catColor" value="#10b981">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Group</label>
                        <input type="text" class="form-control" id="catGroup" value="General">
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="catStatus" checked>
                        <label class="form-check-label">Active</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveCategory()">Save Category</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const moduleId = urlParams.get('id');
        let moduleData = null;
        let allAreas = [];

        async function loadModuleData() {
            try {
                const res = await fetch(`/api/admin/module/${moduleId}`);
                const data = await res.json();
                
                if (!data.success) throw new Error(data.error);
                
                moduleData = data.module;
                allAreas = data.areas || [];
                
                // Header update
                document.getElementById('moduleIcon').textContent = moduleData.icon;
                document.getElementById('moduleName').textContent = moduleData.name;
                document.getElementById('moduleDesc').textContent = moduleData.desc || '';
                document.getElementById('moduleStatus').innerHTML = moduleData.status ? 
                    '<span class="badge bg-success">Active</span>' : 
                    '<span class="badge bg-danger">Inactive</span>';
                
                // Tabs load karo
                renderAreas();
                renderCategories();
                
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function renderAreas() {
            const container = document.getElementById('areasList');
            
            if (allAreas.length === 0) {
                container.innerHTML = '<div class="alert alert-warning">No areas found. Add areas in modules.json first.</div>';
                return;
            }

            container.innerHTML = allAreas.map(area => {
                const isActive = moduleData.areas?.find(a => a.areaId === area.id)?.status || false;
                return `
                    <div class="area-card ${isActive ? 'active' : ''}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">${area.name}</h6>
                                <small class="text-muted">${area.desc || 'No description'}</small>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" 
                                    id="area-${area.id}" 
                                    ${isActive ? 'checked' : ''}
                                    onchange="toggleAreaStatus('${area.id}')">
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleAreaStatus(areaId) {
            const checkbox = document.getElementById(`area-${areaId}`);
            const card = checkbox.closest('.area-card');
            if (checkbox.checked) {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }
        }

        async function saveModuleAreas() {
            const areas = allAreas.map(area => ({
                areaId: area.id,
                status: document.getElementById(`area-${area.id}`).checked
            }));

            try {
                const res = await fetch(`/api/admin/module/${moduleId}/areas`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ areas })
                });
                
                const data = await res.json();
                if (data.success) {
                    alert('Areas saved successfully!');
                    loadModuleData();
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoriesList');
            const cats = moduleData.categories || [];
            document.getElementById('catCount').textContent = cats.length;
            
            if (cats.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No categories yet. Click "Add Category" to create one.</div>';
                return;
            }

            container.innerHTML = cats.map(cat => {
                const activeAreas = cat.areas?.filter(a => a.status).length || 0;
                return `
                    <div class="category-row">
                        <div class="row align-items-center">
                            <div class="col-1 cat-icon">${cat.icon}</div>
                            <div class="col-3">
                                <strong>${cat.name}</strong><br>
                                <small class="text-muted">${cat.group}</small>
                            </div>
                            <div class="col-2">
                                <span class="badge" style="background:${cat.color}">${cat.status ? 'Active' : 'Inactive'}</span>
                            </div>
                            <div class="col-3">
                                <small>Active in ${activeAreas} areas</small>
                            </div>
                            <div class="col-3 text-end">
                                <button class="btn btn-sm btn-outline-primary" onclick="manageCatAreas('${cat.id}')">
                                    <i class="bi bi-geo"></i> Areas
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory('${cat.id}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showAddCategoryModal() {
            document.getElementById('catName').value = '';
            document.getElementById('catIcon').value = '📦';
            document.getElementById('catColor').value = '#10b981';
            document.getElementById('catGroup').value = 'General';
            document.getElementById('catStatus').checked = true;
            new bootstrap.Modal(document.getElementById('categoryModal')).show();
        }

        async function saveCategory() {
            const catData = {
                name: document.getElementById('catName').value,
                icon: document.getElementById('catIcon').value,
                color: document.getElementById('catColor').value,
                group: document.getElementById('catGroup').value,
                status: document.getElementById('catStatus').checked,
                areas: allAreas.map(a => ({ areaId: a.id, status: false }))
            };

            if (!catData.name) {
                alert('Category name required');
                return;
            }

            try {
                const res = await fetch(`/api/admin/module/${moduleId}/category`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(catData)
                });
                
                const data = await res.json();
                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
                    loadModuleData();
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function deleteCategory(catId) {
            if (!confirm('Delete this category?')) return;
            
            try {
                const res = await fetch(`/api/admin/module/${moduleId}/category/${catId}`, {
                    method: 'DELETE'
                });
                
                const data = await res.json();
                if (data.success) {
                    loadModuleData();
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function manageCatAreas(catId) {
            alert('Area toggle UI next step me banayenge. Abhi backend ready hai.');
        }

        // Load on start
        if (!moduleId) {
            alert('Module ID missing in URL');
            window.location.href = '/admin.html';
        } else {
            loadModuleData();
        }
    </script>
</body>
</html>
