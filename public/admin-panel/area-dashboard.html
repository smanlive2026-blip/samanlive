<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Dashboard - SuperLive</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .area-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .area-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .area-card:hover {
            border-color: #6366f1;
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(99,102,241,0.15);
        }
        .area-card.active {
            border-color: #10b981;
            background: #f0fdf4;
        }
        .area-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        .area-code {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
        }
        .area-stats {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
        }
        .manager-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .manager-info {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }
        .manager-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }
        .module-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }
        .module-badge {
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .location-badge.fixed {
            background: #dbeafe;
            color: #1e40af;
        }
        .location-badge.dynamic {
            background: #fef3c7;
            color: #92400e;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="content">
        <h2>🗺️ Area Dashboard</h2>
        
        <!-- Area Cards Grid -->
        <div id="areaCardsGrid" class="area-grid">
            <div class="loading">Loading areas...</div>
        </div>

        <!-- Manager Section - Hidden by default -->
        <div id="managerSection" class="manager-section hidden">
            <div class="manager-info">
                <img id="managerPhoto" src="https://via.placeholder.com/80" class="manager-photo" alt="Manager">
                <div>
                    <h3 id="managerName" style="font-size:24px;margin-bottom:8px;">Select an area</h3>
                    <p id="managerAddress" style="opacity:0.9;margin-bottom:4px;">📍 Address</p>
                    <p id="managerContact" style="opacity:0.9;">📞 Phone | 📧 Email</p>
                </div>
            </div>
            <div>
                <h4 style="margin-bottom:10px;font-size:16px;">📦 Assigned Modules</h4>
                <div id="managerModules" class="module-badges">
                    <span style="opacity:0.7;">No modules assigned</span>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="openAssignModule()" style="margin-top:15px;background:rgba(255,255,255,0.3);border:1px solid white;">
                    + Assign Module
                </button>
            </div>
        </div>

        <!-- Shops Table - Hidden by default -->
        <div id="shopsSection" class="content hidden" style="margin-top:0;">
            <div class="section-header">
                <h2>🏪 Shops in <span id="selectedAreaName">Area</span> 
                    <span id="shopsCount" class="badge badge-info">0</span>
                </h2>
                <input type="text" class="search-box" placeholder="Search shops..." onkeyup="filterShops(this.value)">
            </div>
            <div style="overflow-x:auto;">
                <table id="areaShopsTable">
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Shop Name</th>
                            <th>Location Type</th>
                            <th>Module</th>
                            <th>Range</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="8" class="loading">Select an area to view shops</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Assign Module Modal -->
    <div id="assignModuleModal" class="modal">
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-header">
                <h2>Assign Modules to Manager</h2>
                <button class="close-btn" onclick="closeAssignModule()">×</button>
            </div>
            <div id="moduleCheckboxList" style="max-height:400px;overflow-y:auto;">
                <div class="loading">Loading modules...</div>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;padding-top:20px;border-top:2px solid #f1f5f9;">
                <button class="btn btn-primary" onclick="saveModuleAssignment()">💾 Save</button>
                <button class="btn btn-secondary" onclick="closeAssignModule()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let allAreas = [];
        let allManagers = [];
        let allShops = [];
        let allModules = [];
        let selectedAreaCode = null;
        let selectedManager = null;

        async function loadDashboard() {
            try {
                const [areasData, managersData, shopsData, modulesData] = await Promise.all([
                    apiCall('/areas'),
                    apiCall('/managers'),
                    apiCall('/shops'),
                    apiCall('/modules')
                ]);
                
                allAreas = areasData || [];
                allManagers = managersData || [];
                allShops = shopsData || [];
                allModules = modulesData.modules || modulesData || [];
                
                renderAreaCards();
            } catch (err) {
                console.error(err);
                showToast('Failed to load data: ' + err.message, 'error');
            }
        }

        function renderAreaCards() {
            const grid = document.getElementById('areaCardsGrid');
            
            if (allAreas.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8;">No areas found. Create areas in Area Master first.</div>';
                return;
            }

            grid.innerHTML = allAreas.map(area => {
                const shopCount = allShops.filter(s => s.areaCode === area.areaCode).length;
                const managerCount = allManagers.filter(m => m.areaCode === area.areaCode).length;
                const isActive = area.status;
                
                return `
                    <div class="area-card" onclick="selectArea('${area.areaCode}')">
                        <div class="area-card-header">
                            <div>
                                <div class="area-code">${escapeHtml(area.areaCode)}</div>
                                <div style="font-size:13px;color:#64748b;margin-top:4px;">${escapeHtml(area.areaName)}</div>
                            </div>
                            <span class="badge ${isActive ? 'badge-success' : 'badge-danger'}">
                                ${isActive ? 'Active' : 'Inactive'}
                            </span>
                        </div>
                        <div style="font-size:13px;color:#64748b;margin:8px 0;">
                            📍 ${escapeHtml(area.city)}, ${escapeHtml(area.state)}<br>
                            📏 ${area.radius || 50} km radius
                        </div>
                        <div class="area-stats">
                            <span>🏪 ${shopCount} shops</span>
                            <span>👥 ${managerCount} managers</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.selectArea = (areaCode) => {
            selectedAreaCode = areaCode;
            
            // Highlight selected card
            document.querySelectorAll('.area-card').forEach(card => card.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Load manager and shops
            loadManagerSection(areaCode);
            loadShopsSection(areaCode);
            
            // Show sections
            document.getElementById('managerSection').classList.remove('hidden');
            document.getElementById('shopsSection').classList.remove('hidden');
            
            // Scroll to manager section
            document.getElementById('managerSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };

        function loadManagerSection(areaCode) {
            const manager = allManagers.find(m => m.areaCode === areaCode);
            const area = allAreas.find(a => a.areaCode === areaCode);
            selectedManager = manager;
            
            if (!manager) {
                document.getElementById('managerName').textContent = 'No Manager Assigned';
                document.getElementById('managerAddress').textContent = '📍 ' + area.city + ', ' + area.state;
                document.getElementById('managerContact').textContent = 'Assign a manager to this area';
                document.getElementById('managerPhoto').src = 'https://via.placeholder.com/80?text=No+Manager';
                document.getElementById('managerModules').innerHTML = '<span style="opacity:0.7;">No manager assigned</span>';
                return;
            }
            
            document.getElementById('managerName').textContent = manager.name;
            document.getElementById('managerAddress').textContent = '📍 ' + (manager.address || area.city + ', ' + area.state);
            document.getElementById('managerContact').textContent = `📞 ${manager.phone || 'N/A'} | 📧 ${manager.email || 'N/A'}`;
            document.getElementById('managerPhoto').src = manager.photo || 'https://via.placeholder.com/80?text=' + manager.name.charAt(0);
            
            // Render modules
            const managerModules = manager.modules || [];
            if (managerModules.length === 0) {
                document.getElementById('managerModules').innerHTML = '<span style="opacity:0.7;">No modules assigned</span>';
            } else {
                document.getElementById('managerModules').innerHTML = managerModules.map(modId => {
                    const mod = allModules.find(m => (m._id || m.id) === modId || m.name.toLowerCase() === modId);
                    return mod ? `<span class="module-badge">${mod.icon} ${escapeHtml(mod.name)}</span>` : '';
                }).join('');
            }
        }

        function loadShopsSection(areaCode) {
            const area = allAreas.find(a => a.areaCode === areaCode);
            const shops = allShops.filter(s => s.areaCode === areaCode);
            
            document.getElementById('selectedAreaName').textContent = area.areaName;
            document.getElementById('shopsCount').textContent = shops.length;
            
            const tbody = document.querySelector('#areaShopsTable tbody');
            
            if (shops.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;">No shops in this area yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = shops.map(s => {
                const module = allModules.find(m => (m._id || m.id) === s.moduleId);
                const locationType = s.locationType || 'fixed';
                const lastUpdate = s.lastLocationUpdate ? timeAgo(new Date(s.lastLocationUpdate)) : '';
                
                return `
                    <tr>
                        <td><img src="${s.logo || 'assets/logo.png'}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;" onerror="this.src='https://via.placeholder.com/40?text=🏪'"></td>
                        <td><b>${escapeHtml(s.shopName || s.name)}</b></td>
                        <td>
                            <span class="location-badge ${locationType}">
                                ${locationType === 'fixed' ? '📍 Fixed' : '🚚 Dynamic'}
                            </span>
                            ${locationType === 'dynamic' && lastUpdate ? `<br><small style="color:#64748b;font-size:11px;">${lastUpdate}</small>` : ''}
                        </td>
                        <td>${module ? module.icon + ' ' + escapeHtml(module.name) : '-'}</td>
                        <td>${s.range || 0}m</td>
                        <td>${s.priority || 0}</td>
                        <td><span class="status-badge status-${s.status}">${s.status}</span></td>
                        <td class="actions">
                            <button class="btn btn-primary btn-sm" onclick="editShop('${s._id}')">Edit</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.openAssignModule = () => {
            if (!selectedManager) {
                return showToast('No manager assigned to this area', 'error');
            }
            
            const modal = document.getElementById('assignModuleModal');
            const list = document.getElementById('moduleCheckboxList');
            
            list.innerHTML = allModules.map(mod => {
                const modId = mod._id || mod.id;
                const isChecked = selectedManager.modules && selectedManager.modules.includes(modId);
                return `
                    <div style="display:flex;align-items:center;padding:12px;background:white;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:8px;">
                        <input type="checkbox" id="mod_${modId}" value="${modId}" ${isChecked ? 'checked' : ''} style="width:18px;height:18px;margin-right:12px;">
                        <label for="mod_${modId}" style="flex:1;cursor:pointer;margin:0;">
                            <b>${mod.icon} ${escapeHtml(mod.name)}</b><br>
                            <small style="color:#64748b;">${escapeHtml(mod.desc || 'No description')}</small>
                        </label>
                    </div>
                `;
            }).join('');
            
            modal.classList.add('active');
        };

        window.closeAssignModule = () => {
            document.getElementById('assignModuleModal').classList.remove('active');
        };

        window.saveModuleAssignment = async () => {
            const checkboxes = document.querySelectorAll('#moduleCheckboxList input[type="checkbox"]:checked');
            const selectedModules = Array.from(checkboxes).map(cb => cb.value);
            
            try {
                await apiCall(`/managers/${selectedManager._id}`, 'PUT', { modules: selectedModules });
                showToast('Modules assigned successfully!');
                closeAssignModule();
                await loadDashboard();
                selectArea(selectedAreaCode); // Refresh view
            } catch (err) {
                showToast('Failed to assign modules: ' + err.message, 'error');
            }
        };

        window.editShop = (shopId) => {
            // Redirect to shops page with edit mode
            window.location.href = `shops.html?edit=${shopId}`;
        };

        window.filterShops = (query) => {
            const q = query.toLowerCase().trim();
            const rows = document.querySelectorAll('#areaShopsTable tbody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? '' : 'none';
            });
        };

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialize
        loadDashboard();
    </script>
</body>
</html>
