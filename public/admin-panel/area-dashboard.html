<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Dashboard - SuperLive</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/area.css">
    <style>
        .area-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .area-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .area-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }
        .area-card.active {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        .area-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        .area-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }
        .area-card-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
        }
        .manager-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: none;
        }
        .manager-card.show {
            display: block;
            animation: slideDown 0.3s;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .manager-info {
            display: flex;
            gap: 20px;
            align-items: start;
        }
        .manager-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
        }
        .manager-details h3 {
            font-size: 22px;
            margin: 0 0 8px 0;
        }
        .manager-details p {
            margin: 4px 0;
            opacity: 0.9;
        }
        .module-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .module-tag {
            background: rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #64748b;
        }
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .location-badge.fixed {
            background: #dbeafe;
            color: #1e40af;
        }
        .location-badge.dynamic {
            background: #fef3c7;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div class="content">
        <h2 style="margin-bottom: 20px;">🗺️ Area Dashboard</h2>
        
        <!-- Area Cards Grid -->
        <div class="area-cards-grid" id="areaCardsGrid">
            <div class="loading">Loading areas...</div>
        </div>

        <!-- Manager Card - Hidden by default -->
        <div class="manager-card" id="managerCard">
            <div class="manager-info">
                <img id="managerPhoto" class="manager-photo" src="https://via.placeholder.com/80" alt="Manager">
                <div class="manager-details">
                    <h3 id="managerName">-</h3>
                    <p>📱 <span id="managerPhone">-</span></p>
                    <p>📧 <span id="managerEmail">-</span></p>
                    <p>📍 <span id="managerAddress">-</span></p>
                    <div class="module-tags" id="managerModules"></div>
                </div>
            </div>
            <button class="btn btn-success" style="margin-top: 16px;" onclick="openAssignModule()">+ Assign Module</button>
        </div>

        <!-- Shops Table -->
        <div class="card" id="shopsSection" style="display: none;">
            <div class="card-header">
                <h2>🏪 Shops in <span id="selectedAreaName">-</span> <span id="areaShopsCount" class="badge badge-info">0</span></h2>
                <input type="text" class="search-box" placeholder="Search shops..." onkeyup="filterAreaShops(this.value)">
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Name</th>
                            <th>Location Type</th>
                            <th>Module</th>
                            <th>Manager</th>
                            <th>Address</th>
                            <th>Range</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="areaShopsTable">
                        <tr><td colspan="10" class="loading">Select an area to view shops</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="emptyState" class="empty-state">
            <h3>👆 Select an Area Above</h3>
            <p>Click on any area card to view manager details and shops</p>
        </div>
    </div>

    <!-- Assign Module Modal -->
    <div id="assignModuleModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>Assign Module to Manager</h2>
                <button class="close-btn" onclick="closeAssignModule()">×</button>
            </div>
            <div class="form-group">
                <label>Select Module</label>
                <select id="moduleSelectAssign" style="width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px;">
                    <option value="">-- Select Module --</option>
                </select>
            </div>
            <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="saveModuleAssign()">Assign Module</button>
        </div>
    </div>

    <script>
        let allAreas = [];
        let allManagers = [];
        let allShops = [];
        let allModules = [];
        let selectedAreaCode = null;
        let selectedManager = null;

        async function loadDashboard() {
            try {
                const [areasData, managersData, shopsData, modulesData] = await Promise.all([
                    apiCall('/areas'),
                    apiCall('/managers'),
                    apiCall('/shops'),
                    apiCall('/modules')
                ]);
                
                allAreas = areasData || [];
                allManagers = managersData || [];
                allShops = shopsData || [];
                allModules = modulesData.modules || modulesData || [];
                
                renderAreaCards();
            } catch (err) {
                console.error('Load dashboard error:', err);
                showToast('Failed to load data: ' + err.message, 'error');
            }
        }

        function renderAreaCards() {
            const grid = document.getElementById('areaCardsGrid');
            
            if (allAreas.length === 0) {
                grid.innerHTML = '<p style="color:#94a3b8;text-align:center;grid-column:1/-1;">No areas found</p>';
                return;
            }

            grid.innerHTML = allAreas.map(area => {
                const manager = allManagers.find(m => m.areaCode === area.areaCode);
                const shopCount = allShops.filter(s => s.areaCode === area.areaCode).length;
                const moduleCount = allModules.filter(m => m.activeAreas && m.activeAreas.includes(area.areaCode)).length;
                
                return `
                    <div class="area-card" onclick="selectArea('${area.areaCode}')" id="card-${area.areaCode}">
                        <div class="area-card-header">
                            <h3>${escapeHtml(area.areaName)}</h3>
                            <span class="status-badge ${area.status ? 'status-active' : 'status-hidden'}">
                                ${area.status ? 'Active' : 'Inactive'}
                            </span>
                        </div>
                        <p style="color: #64748b; font-size: 14px; margin: 0;">
                            📍 ${escapeHtml(area.city)}, ${escapeHtml(area.state)}
                        </p>
                        <p style="color: #64748b; font-size: 13px; margin: 8px 0 0 0; font-family: monospace;">
                            ${escapeHtml(area.areaCode)} • ${area.radius}km radius
                        </p>
                        <div class="area-card-stats">
                            <span>👤 ${manager ? '1 Manager' : 'No Manager'}</span>
                            <span>🏪 ${shopCount} Shops</span>
                            <span>📦 ${moduleCount} Modules</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.selectArea = (areaCode) => {
            selectedAreaCode = areaCode;
            
            // Update active card
            document.querySelectorAll('.area-card').forEach(card => card.classList.remove('active'));
            document.getElementById(`card-${areaCode}`).classList.add('active');
            
            // Hide empty state
            document.getElementById('emptyState').style.display = 'none';
            
            // Load manager
            const area = allAreas.find(a => a.areaCode === areaCode);
            selectedManager = allManagers.find(m => m.areaCode === areaCode);
            
            if (selectedManager) {
                renderManagerCard(selectedManager, area);
                document.getElementById('managerCard').classList.add('show');
            } else {
                document.getElementById('managerCard').classList.remove('show');
                showToast('No manager assigned to this area', 'error');
            }
            
            // Load shops
            renderAreaShops(areaCode);
            document.getElementById('shopsSection').style.display = 'block';
            document.getElementById('selectedAreaName').textContent = area.areaName;
        };

        function renderManagerCard(manager, area) {
            document.getElementById('managerPhoto').src = manager.photo || 'https://via.placeholder.com/80';
            document.getElementById('managerName').textContent = manager.name;
            document.getElementById('managerPhone').textContent = manager.phone || '-';
            document.getElementById('managerEmail').textContent = manager.email || '-';
            document.getElementById('managerAddress').textContent = manager.address || '-';
            
            // Manager ke modules
            const managerModules = allModules.filter(m => 
                (manager.activeModules && manager.activeModules.includes(m._id)) ||
                (m.activeAreas && m.activeAreas.includes(area.areaCode))
            );
            
            document.getElementById('managerModules').innerHTML = managerModules.length > 0
                ? managerModules.map(m => `<span class="module-tag">${m.icon} ${escapeHtml(m.name)}</span>`).join('')
                : '<span style="opacity:0.7;">No modules assigned</span>';
        }

        function renderAreaShops(areaCode) {
            const shops = allShops.filter(s => s.areaCode === areaCode);
            document.getElementById('areaShopsCount').textContent = shops.length;
            const tbody = document.getElementById('areaShopsTable');
            
            if (shops.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#94a3b8;">No shops in this area</td></tr>';
                return;
            }
            
            tbody.innerHTML = shops.map(s => {
                const module = allModules.find(m => (m._id || m.id) === s.moduleId);
                const manager = allManagers.find(m => m._id === s.managerId);
                const locationType = s.locationType || 'fixed';
                const lastUpdate = s.lastLocationUpdate ? timeAgo(new Date(s.lastLocationUpdate)) : '';
                
                return `<tr>
                    <td><img src="${s.logo || 'assets/logo.png'}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td><b>${escapeHtml(s.name)}</b></td>
                    <td>
                        <span class="badge location-badge ${locationType}">
                            ${locationType === 'fixed' ? '📍 Fixed' : '🚚 Dynamic'}
                        </span>
                        ${locationType === 'dynamic' && lastUpdate ? `<br><small style="color:#64748b;">${lastUpdate}</small>` : ''}
                    </td>
                    <td>${module ? module.icon + ' ' + escapeHtml(module.name) : '-'}</td>
                    <td>${manager ? escapeHtml(manager.name) : '<span class="help-text">Unassigned</span>'}</td>
                    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;font-size:13px;">${escapeHtml(s.address || '-')}</td>
                    <td>${s.range || 0}m</td>
                    <td>${s.priority || 0}</td>
                    <td><span class="status-badge status-${s.status}">${s.status}</span></td>
                    <td class="actions">
                        <button class="btn btn-primary btn-sm" onclick="editShopLocation('${s._id}')">Edit</button>
                    </td>
                </tr>`;
            }).join('');
        }

        window.openAssignModule = () => {
            if (!selectedManager) return showToast('No manager selected', 'error');
            
            const select = document.getElementById('moduleSelectAssign');
            select.innerHTML = '<option value="">-- Select Module --</option>' +
                allModules.map(m => `<option value="${m._id || m.id}">${m.icon} ${escapeHtml(m.name)}</option>`).join('');
            
            document.getElementById('assignModuleModal').classList.add('active');
        };

        window.closeAssignModule = () => {
            document.getElementById('assignModuleModal').classList.remove('active');
        };

        window.saveModuleAssign = async () => {
            const moduleId = document.getElementById('moduleSelectAssign').value;
            if (!moduleId) return showToast('Select a module', 'error');
            
            try {
                const module = allModules.find(m => (m._id || m.id) === moduleId);
                const updatedAreas = [...(module.activeAreas || [])];
                if (!updatedAreas.includes(selectedAreaCode)) {
                    updatedAreas.push(selectedAreaCode);
                }
                
                await apiCall('/modules/' + moduleId, 'PUT', { activeAreas: updatedAreas });
                showToast('Module assigned successfully!');
                closeAssignModule();
                await loadDashboard();
                selectArea(selectedAreaCode); // Refresh
            } catch (err) {
                showToast('Failed to assign: ' + err.message, 'error');
            }
        };

        window.editShopLocation = (shopId) => {
            // Redirect to shops.html with shop selected
            window.location.href = `shops.html?edit=${shopId}`;
        };

        window.filterAreaShops = (query) => {
            const q = query.toLowerCase().trim();
            const rows = document.querySelectorAll('#areaShopsTable tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(q) ? '' : 'none';
            });
        };

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialize
        loadDashboard();
    </script>
</body>
</html>
