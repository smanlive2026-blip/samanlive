<div class="page-header">
    <h2>🚚 Delivery Partners Management</h2>
    <button class="btn btn-primary" onclick="showAddDeliveryModal()">➕ Add Partner</button>
</div>

<div class="card">
    <div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;">
        <input type="text" id="deliverySearch" placeholder="Search Name, Phone..." oninput="searchDelivery()" style="flex:1;min-width:200px;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
        <select id="statusFilter" onchange="filterByStatus()" style="padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            <option value="all">All Status</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
            <option value="busy">On Delivery</option>
        </select>
        <select id="verifyFilter" onchange="filterByVerify()" style="padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            <option value="all">All</option>
            <option value="verified">Verified</option>
            <option value="pending">Pending</option>
        </select>
    </div>

    <table id="deliveryTable" style="width:100%;border-collapse:collapse;">
        <thead>
            <tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0;">
                <th style="padding:12px;text-align:left;">Name</th>
                <th style="padding:12px;text-align:left;">Phone</th>
                <th style="padding:12px;text-align:left;">Vehicle</th>
                <th style="padding:12px;text-align:left;">Status</th>
                <th style="padding:12px;text-align:left;">Orders</th>
                <th style="padding:12px;text-align:left;">Rating</th>
                <th style="padding:12px;text-align:left;">Verified</th>
                <th style="padding:12px;text-align:left;">Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Add/Edit Delivery Modal -->
<div id="deliveryModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:white;padding:24px;border-radius:12px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto;">
        <h3 id="modalTitle">Add Delivery Partner</h3>
        <form id="deliveryForm" onsubmit="saveDelivery(event)">
            <input type="hidden" id="deliveryId">
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Name *</label>
                <input type="text" id="deliveryName" required style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Phone *</label>
                <input type="tel" id="deliveryPhone" required style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Email</label>
                <input type="email" id="deliveryEmail" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Vehicle Type *</label>
                <select id="vehicleType" required style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                    <option value="">Select Vehicle</option>
                    <option value="bike">Bike</option>
                    <option value="scooter">Scooter</option>
                    <option value="cycle">Cycle</option>
                    <option value="auto">Auto</option>
                </select>
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Vehicle Number</label>
                <input type="text" id="vehicleNumber" placeholder="DL01AB1234" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">License Number</label>
                <input type="text" id="licenseNumber" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Aadhar Number</label>
                <input type="text" id="aadharNumber" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button type="submit" style="flex:1;padding:10px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Save Partner</button>
                <button type="button" onclick="closeDeliveryModal()" style="flex:1;padding:10px;background:#e2e8f0;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Cancel</button>
            </div>
        </form>
    </div>
</div>

<style>
.btn-icon { padding: 6px 10px; border: none; background: #f1f5f9; border-radius: 6px; cursor: pointer; margin: 0 2px; }
.btn-icon:hover { background: #e2e8f0; }
.badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.status-online { background: #d1fae5; color: #065f46; }
.status-offline { background: #f1f5f9; color: #475569; }
.status-busy { background: #fef3c7; color: #92400e; }
.verify-yes { background: #d1fae5; color: #065f46; }
.verify-no { background: #fee2e2; color: #991b1b; }
</style>

<script>
let allDelivery = [];

async function loadDelivery() {
    const tbody = document.querySelector('#deliveryTable tbody');
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;">Loading...</td></tr>`;
    try {
        allDelivery = await apiCall('/delivery') || [];
        renderDelivery(allDelivery);
        showToast(`${allDelivery.length} partners loaded`, 'success');
    } catch(err) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#ef4444;">Failed to load</td></tr>`;
    }
}

function renderDelivery(partners) {
    const tbody = document.querySelector('#deliveryTable tbody');
    if(partners.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#64748b;">Koi delivery partner nahi mila 😔</td></tr>`;
        return;
    }
    tbody.innerHTML = partners.map(p => `
        <tr>
            <td><strong>${escapeHtml(p.name || 'N/A')}</strong></td>
            <td>${escapeHtml(p.phone || '-')}</td>
            <td>${escapeHtml(p.vehicleType || '-')} ${p.vehicleNumber ? `<br><small>${escapeHtml(p.vehicleNumber)}</small>` : ''}</td>
            <td><span class="badge status-${p.status || 'offline'}">${p.status || 'offline'}</span></td>
            <td>${p.completedOrders || 0} / ${p.totalOrders || 0}</td>
            <td>⭐ ${p.rating || '0.0'} (${p.ratingCount || 0})</td>
            <td><span class="badge ${p.isVerified ? 'verify-yes' : 'verify-no'}">${p.isVerified ? 'Verified' : 'Pending'}</span></td>
            <td>
                <button class="btn-icon" onclick="toggleVerify('${p._id}', ${!p.isVerified})" title="${p.isVerified ? 'Unverify' : 'Verify'}" style="background:${p.isVerified ? '#fee2e2' : '#d1fae5'};">${p.isVerified ? '❌' : '✅'}</button>
                <button class="btn-icon" onclick="editDelivery('${p._id}')" title="Edit">✏️</button>
                <button class="btn-icon" onclick="deleteDelivery('${p._id}')" title="Delete" style="background:#fee2e2;">🗑️</button>
            </td>
        </tr>
    `).join('');
}

function showAddDeliveryModal() {
    document.getElementById('modalTitle').textContent = 'Add Delivery Partner';
    document.getElementById('deliveryForm').reset();
    document.getElementById('deliveryId').value = '';
    document.getElementById('deliveryModal').style.display = 'flex';
}

function closeDeliveryModal() {
    document.getElementById('deliveryModal').style.display = 'none';
}

function editDelivery(id) {
    const partner = allDelivery.find(p => p._id === id);
    if(!partner) return;
    document.getElementById('modalTitle').textContent = 'Edit Delivery Partner';
    document.getElementById('deliveryId').value = partner._id;
    document.getElementById('deliveryName').value = partner.name;
    document.getElementById('deliveryPhone').value = partner.phone;
    document.getElementById('deliveryEmail').value = partner.email || '';
    document.getElementById('vehicleType').value = partner.vehicleType;
    document.getElementById('vehicleNumber').value = partner.vehicleNumber || '';
    document.getElementById('licenseNumber').value = partner.licenseNumber || '';
    document.getElementById('aadharNumber').value = partner.aadharNumber || '';
    document.getElementById('deliveryModal').style.display = 'flex';
}

async function saveDelivery(e) {
    e.preventDefault();
    const id = document.getElementById('deliveryId').value;
    const data = {
        name: document.getElementById('deliveryName').value,
        phone: document.getElementById('deliveryPhone').value,
        email: document.getElementById('deliveryEmail').value,
        vehicleType: document.getElementById('vehicleType').value,
        vehicleNumber: document.getElementById('vehicleNumber').value,
        licenseNumber: document.getElementById('licenseNumber').value,
        aadharNumber: document.getElementById('aadharNumber').value
    };
    try {
        if(id) {
            await apiCall(`/delivery/${id}`, 'PUT', data);
            showToast('Partner updated!', 'success');
        } else {
            await apiCall('/delivery', 'POST', data);
            showToast('Partner added!', 'success');
        }
        closeDeliveryModal();
        loadDelivery();
    } catch(err) {
        showToast('Failed to save', 'error');
    }
}

async function toggleVerify(id, verify) {
    if(!confirm(verify ? 'Verify this partner?' : 'Remove verification?')) return;
    try {
        await apiCall(`/delivery/${id}/verify`, 'PUT', { isVerified: verify });
        showToast(verify ? 'Partner verified!' : 'Verification removed!', 'success');
        loadDelivery();
    } catch(err) {
        showToast('Failed to update', 'error');
    }
}

async function deleteDelivery(id) {
    if(!confirm('Delete this partner?')) return;
    try {
        await apiCall(`/delivery/${id}`, 'DELETE');
        showToast('Partner deleted!', 'success');
        loadDelivery();
    } catch(err) {
        showToast('Failed to delete', 'error');
    }
}

function searchDelivery() {
    const query = document.getElementById('deliverySearch').value.toLowerCase();
    const filtered = allDelivery.filter(p => 
        p.name?.toLowerCase().includes(query) || 
        p.phone?.toLowerCase().includes(query)
    );
    renderDelivery(filtered);
}

function filterByStatus() {
    const status = document.getElementById('statusFilter').value;
    if(status === 'all') renderDelivery(allDelivery);
    else renderDelivery(allDelivery.filter(p => (p.status || 'offline') === status));
}

function filterByVerify() {
    const verify = document.getElementById('verifyFilter').value;
    if(verify === 'all') renderDelivery(allDelivery);
    else if(verify === 'verified') renderDelivery(allDelivery.filter(p => p.isVerified));
    else renderDelivery(allDelivery.filter(p => !p.isVerified));
}

// Auto load
loadDelivery();
</script>
