<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMANLIVE Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>🔧 SAMANLIVE Control Panel</h1>
        </div>

        <div class="admin-navbar">
            <button class="nav-btn active" onclick="loadPage('dashboard', this)">📊 Dashboard</button>
            <button class="nav-btn" onclick="loadPage('orders', this)">📋 Orders</button>
            <button class="nav-btn" onclick="loadPage('products', this)">📦 Products</button>
            <button class="nav-btn" onclick="loadPage('users', this)">👥 Users</button>
            <button class="nav-btn" onclick="loadPage('shops', this)">🏪 Shops</button>
            <button class="nav-btn" onclick="loadPage('categories', this)">📂 Categories</button>
            <button class="nav-btn" onclick="loadPage('modules', this)">🧩 Modules</button>
            <button class="nav-btn" onclick="loadPage('areas', this)">🗺️ Areas</button>
            <button class="nav-btn" onclick="loadPage('coupons', this)">🎟️ Coupons</button>
            <button class="nav-btn" onclick="loadPage('delivery', this)">🚚 Delivery</button>
            <button class="nav-btn" onclick="loadPage('reports', this)">📈 Reports</button>
            <button class="nav-btn" onclick="loadPage('managers', this)">👔 Managers</button>
            <button class="nav-btn" onclick="loadPage('content', this)">📝 Content</button>
            <button class="nav-btn" onclick="loadPage('api-routes', this)">🔍 API Routes</button>
            <button class="nav-btn" onclick="loadPage('settings', this)">⚙️ Settings</button>
        </div>

        <div id="mainContainer">
            <!-- Yaha sab pages load honge -->
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="assets/admin.js"></script>
    <script>
        // Pehli baar dashboard load karo
        document.addEventListener('DOMContentLoaded', () => {
            loadPage('dashboard', document.querySelector('.nav-btn.active'));
        });
    </script>
</body>
</html>
