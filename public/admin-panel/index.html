<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMANLIVE Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="assets/admin.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Premium Header */
        .admin-header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #8b5cf6 100%);
            padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .admin-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0;
            letter-spacing: -0.5px;
        }
        
        .admin-header h1::before {
            content: '⚡';
            font-size: 28px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Modern Navbar */
        .admin-navbar {
            background: white;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 68px;
            z-index: 99;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f1f5f9;
        }
        
        .admin-navbar::-webkit-scrollbar {
            height: 6px;
        }
        
        .admin-navbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        
        .admin-navbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .admin-navbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            margin: 0 4px;
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 10px;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }
        
        .nav-btn:hover {
            background: #eff6ff;
            border-color: #dbeafe;
            color: #1e40af;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }
        
        .nav-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }
        
        .nav-btn.active:hover {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        /* Main Container */
        #mainContainer {
            padding: 24px;
            min-height: calc(100vh - 140px);
            animation: fadeIn 0.4s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Loading Animation */
        .page-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            flex-direction: column;
            gap: 16px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header h1 {
                font-size: 20px;
            }
            .admin-header h1::before {
                font-size: 24px;
            }
            .nav-btn {
                padding: 8px 14px;
                font-size: 13px;
            }
            #mainContainer {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>SAMANLIVE Control Panel</h1>
        </div>

        <div class="admin-navbar">
            <button class="nav-btn active" onclick="loadPage('dashboard', this)">📊 Dashboard</button>
            <button class="nav-btn" onclick="loadPage('orders', this)">📋 Orders</button>
            <button class="nav-btn" onclick="loadPage('products', this)">📦 Products</button>
            <button class="nav-btn" onclick="loadPage('users', this)">👥 Users</button>
            <button class="nav-btn" onclick="loadPage('shops', this)">🏪 Shops</button>
            <button class="nav-btn" onclick="loadPage('categories', this)">📂 Categories</button>
            <button class="nav-btn" onclick="loadPage('modules', this)">🧩 Modules</button>
            <button class="nav-btn" onclick="loadPage('areas', this)">🗺️ Areas</button>
            <button class="nav-btn" onclick="loadPage('coupons', this)">🎟️ Coupons</button>
            <button class="nav-btn" onclick="loadPage('delivery', this)">🚚 Delivery</button>
            <button class="nav-btn" onclick="loadPage('reports', this)">📈 Reports</button>
            <button class="nav-btn" onclick="loadPage('managers', this)">👔 Managers</button>
            <button class="nav-btn" onclick="loadPage('content', this)">📝 Content</button>
            <button class="nav-btn" onclick="loadPage('api-routes', this)">🔍 API Routes</button>
            <button class="nav-btn" onclick="loadPage('settings', this)">⚙️ Settings</button>
        </div>

        <div id="mainContainer">
            <div class="page-loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading dashboard...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="assets/admin.js"></script>
    <script>
        // Pehli baar dashboard load karo
        document.addEventListener('DOMContentLoaded', () => {
            loadPage('dashboard', document.querySelector('.nav-btn.active'));
        });
    </script>
</body>
</html>
