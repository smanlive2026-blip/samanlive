<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMANLIVE Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>🔧 SAMANLIVE Control Panel</h1>
        </div>

        <div class="admin-navbar">
            <button class="nav-btn active" onclick="loadPage('dashboard')">📊 Dashboard</button>
            <button class="nav-btn" onclick="loadPage('modules')">📦 Modules</button>
            <button class="nav-btn" onclick="loadPage('categories')">📂 Categories</button>
            <button class="nav-btn" onclick="loadPage('shops')">🏪 Shops</button>
            <button class="nav-btn" onclick="loadPage('managers')">👨‍💼 Managers</button>
            <button class="nav-btn" onclick="loadPage('content')">📢 Content</button>
            <button class="nav-btn" onclick="loadPage('api-routes')">🔍 API Routes</button>
            <button class="nav-btn" onclick="loadPage('settings')">⚙️ Settings</button>
        </div>

        <div id="mainContainer">
            <!-- Yaha sab pages load honge -->
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="assets/admin.js"></script>
    <script>
        // Pehli baar dashboard load karo
        document.addEventListener('DOMContentLoaded', () => loadPage('dashboard'));
    </script>
</body>
</html>
