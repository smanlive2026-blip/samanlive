<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Market Shops - Admin</title>
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <!-- Tera existing sidebar code -->
        </div>
        
        <div class="main-content">
            <div class="page-header">
                <h1>Local Market Shops</h1>
                <button class="btn btn-primary" onclick="openAddShopModal()">+ Add New Shop</button>
            </div>

            <div class="filters">
                <select id="filterCategory" onchange="loadShops()">
                    <option value="">All Categories</option>
                </select>
                <select id="filterStatus" onchange="loadShops()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                    <option value="pending">Pending</option>
                </select>
                <input type="text" id="searchShop" placeholder="Search shop name..." onkeyup="loadShops()">
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Shop Name</th>
                            <th>Owner</th>
                            <th>Category</th>
                            <th>Area</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="shopsTableBody">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="shopModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Add Shop</h2>
            <form id="shopForm">
                <input type="hidden" id="shopId">
                <div class="form-group">
                    <label>Shop Name *</label>
                    <input type="text" id="shopName" required>
                </div>
                <div class="form-group">
                    <label>Owner Name *</label>
                    <input type="text" id="ownerName" required>
                </div>
                <div class="form-group">
                    <label>Mobile *</label>
                    <input type="text" id="mobile" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="shopCategory" required></select>
                </div>
                <div class="form-group">
                    <label>Area *</label>
                    <select id="shopArea" required></select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="shopStatus">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Save Shop</button>
            </form>
        </div>
    </div>

    <script src="assets/admin.js"></script>
    <script>
        let allCategories = [];
        let allAreas = [];

        async function init() {
            await loadCategories();
            await loadAreas();
            await loadShops();
        }

        async function loadCategories() {
            const res = await fetch('/api/modules');
            const modules = await res.json();
            const localMarket = modules.find(m => m.moduleId === 'local-market');
            allCategories = localMarket?.categoryDetails || [];
            
            const catSelect = document.getElementById('shopCategory');
            const filterCat = document.getElementById('filterCategory');
            allCategories.forEach(cat => {
                catSelect.innerHTML += `<option value="${cat.slug}">${cat.icon} ${cat.name}</option>`;
                filterCat.innerHTML += `<option value="${cat.slug}">${cat.name}</option>`;
            });
        }

        async function loadAreas() {
            const res = await fetch('/api/areas');
            allAreas = await res.json();
            const areaSelect = document.getElementById('shopArea');
            allAreas.forEach(area => {
                areaSelect.innerHTML += `<option value="${area._id}">${area.name}</option>`;
            });
        }

        async function loadShops() {
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchShop').value;
            
            let url = '/api/local-market/shops?';
            if(category) url += `category=${category}&`;
            if(status) url += `status=${status}&`;
            if(search) url += `search=${search}&`;
            
            const res = await fetch(url);
            const shops = await res.json();
            
            const tbody = document.getElementById('shopsTableBody');
            if(shops.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No shops found</td></tr>';
                return;
            }
            
            tbody.innerHTML = shops.map(shop => `
                <tr>
                    <td>${shop.shopName}</td>
                    <td>${shop.ownerName}</td>
                    <td>${shop.category}</td>
                    <td>${shop.areaName || '-'}</td>
                    <td><span class="badge badge-${shop.status}">${shop.status}</span></td>
                    <td>
                        <button class="btn-sm btn-info" onclick="editShop('${shop._id}')">Edit</button>
                        <button class="btn-sm btn-danger" onclick="deleteShop('${shop._id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function openAddShopModal() {
            document.getElementById('shopForm').reset();
            document.getElementById('shopId').value = '';
            document.getElementById('modalTitle').innerText = 'Add Shop';
            document.getElementById('shopModal').style.display = 'block';
        }

        async function editShop(id) {
            const res = await fetch(`/api/local-market/shops/${id}`);
            const shop = await res.json();
            document.getElementById('shopId').value = shop._id;
            document.getElementById('shopName').value = shop.shopName;
            document.getElementById('ownerName').value = shop.ownerName;
            document.getElementById('mobile').value = shop.mobile;
            document.getElementById('shopCategory').value = shop.category;
            document.getElementById('shopArea').value = shop.area;
            document.getElementById('shopStatus').value = shop.status;
            document.getElementById('modalTitle').innerText = 'Edit Shop';
            document.getElementById('shopModal').style.display = 'block';
        }

        async function deleteShop(id) {
            if(!confirm('Are you sure?')) return;
            await fetch(`/api/local-market/shops/${id}`, { method: 'DELETE' });
            loadShops();
        }

        document.getElementById('shopForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('shopId').value;
            const data = {
                shopName: document.getElementById('shopName').value,
                ownerName: document.getElementById('ownerName').value,
                mobile: document.getElementById('mobile').value,
                category: document.getElementById('shopCategory').value,
                area: document.getElementById('shopArea').value,
                status: document.getElementById('shopStatus').value
            };
            
            const url = id ? `/api/local-market/shops/${id}` : '/api/local-market/shops';
            const method = id ? 'PUT' : 'POST';
            
            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            closeModal();
            loadShops();
        };

        function closeModal() {
            document.getElementById('shopModal').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
