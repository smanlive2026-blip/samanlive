<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modules - SAMANLIVE Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="assets/admin.css">
    <style>
        #moduleMap { height: 500px; width: 100%; border-radius: 8px; margin-top: 15px; }
       .module-row { cursor: pointer; }
       .module-row:hover { background: #f8fafc; }
       .expand-icon { transition: transform 0.2s; display: inline-block; }
       .expand-icon.open { transform: rotate(90deg); }
       .area-expand { padding: 15px; background: #f8fafc; border-radius: 8px; }
       .status-active { background: #10b981; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
       .status-hidden { background: #6b7280; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 SAMANLIVE Control Panel</h1>

        <div class="admin-navbar">
            <a href="index.html" class="nav-btn">📊 Dashboard</a>
            <a href="modules.html" class="nav-btn active">📦 Modules</a>
            <a href="content.html" class="nav-btn">📢 Content</a>
            <a href="shops.html" class="nav-btn">🏪 Shops</a>
            <a href="managers.html" class="nav-btn">👨‍💼 Managers</a>
            <a href="qr-batch.html" class="nav-btn">🎟️ QR Batch</a>
        </div>

        <div id="modulesTab" class="content">
            <h2>📦 All Modules <span id="moduleCount"></span></h2>
            <div class="action-bar">
                <button class="btn-success" onclick="addItem('module')">+ Add New Module</button>
                <input type="text" class="search-box" placeholder="Search modules..." onkeyup="filterTable('modulesTable', this.value)">
            </div>
            <table id="modulesTable">
                <thead>
                    <tr><th style="width:40px;"></th><th>Icon</th><th>Name</th><th>Color</th><th>Link</th><th>Areas</th><th>Priority</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr><td colspan="9" style="text-align:center;padding:20px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="moduleAreaTab" class="content" style="margin-top:20px;">
            <h2>📍 Module Area Mapping</h2>
            <div class="form-group">
                <label>Select Module:</label>
                <select id="moduleSelectArea" onchange="loadModuleArea()">
                    <option value="">-- Select Module --</option>
                </select>
            </div>
            <div class="map-controls">
                <button class="btn-primary" onclick="saveModuleArea()">💾 Save Area</button>
                <button class="btn-secondary" onclick="clearModuleDrawing()">🗑️ Clear</button>
                <button class="btn-warning" onclick="deleteModuleArea()">❌ Remove Area</button>
            </div>
            <div id="moduleMap"></div>
            <div class="area-info" id="areaInfo" style="display:none;">
                <strong>Current Area:</strong> <span id="areaDetails"></span>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Edit Item</h2>
            <input type="hidden" id="editId">
            <div id="modalFields"></div>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="btn-primary" onclick="saveItem()">💾 Save Changes</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="assets/admin.js"></script>
<script>
// ==================== MODULES PAGE JS ====================
// const API = '/api'; ← YE LINE HATA DI. admin.js me already hai

let allModules = [];
let editingId = null;
let map, drawnItems;
let currentModuleId = null;
let currentDrawnLayer = null;

function showToast(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.style.cssText = `position:fixed;top:20px;right:20px;padding:15px 25px;background:${type==='success'?'#10b981':'#ef4444'};color:white;border-radius:8px;z-index:9999;`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

async function apiCall(endpoint, method = 'GET', body = null) {
    const opts = { method, headers: {} };
    if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
    }
    const res = await fetch(API + endpoint, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'API Error');
    return data;
}

// SABSE PEHLE TABLE LOAD HOGA
async function loadData() {
    try {
        const result = await apiCall('/modules');
        allModules = Array.isArray(result) ? result : [];
        document.getElementById('moduleCount').textContent = `(${allModules.length})`;
        renderModules();
        populateModuleDropdown();
        initModuleMap();
    } catch (err) {
        document.querySelector('#modulesTable tbody').innerHTML = `<tr><td colspan="9" style="text-align:center;color:red;padding:20px;">Error: ${err.message}</td></tr>`;
    }
}

function renderModules() {
    const tbody = document.querySelector('#modulesTable tbody');
    if (allModules.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#6b7280;padding:20px;">No modules found</td></tr>';
        return;
    }
    
    tbody.innerHTML = allModules.map(m => {
        const moduleStatus = m.status === true || m.status === 'active' ? 'active' : 'hidden';
        const moduleId = m.id || m._id;
        
        return `
        <tr class="module-row" onclick="toggleModuleAreas('${moduleId}')">
            <td><span class="expand-icon" id="icon-${moduleId}">▶</span></td>
            <td style="font-size:24px">${m.icon}</td>
            <td><b>${m.name}</b></td>
            <td><span style="background:${m.color};padding:4px 8px;border-radius:4px;color:white">${m.color}</span></td>
            <td>${m.link}</td>
            <td><span class="shop-count-badge">${m.areas?.length || 0} areas</span></td>
            <td>${m.priority || 0}</td>
            <td><span class="status-${moduleStatus}">${moduleStatus}</span></td>
            <td onclick="event.stopPropagation()">
                <button class="btn-primary" onclick="editItem('${moduleId}')">Edit</button>
                <button class="btn-danger" onclick="deleteItem('${moduleId}')">Delete</button>
            </td>
        </tr>
        <tr id="areas-${moduleId}" style="display:none;">
            <td colspan="9">
                <div class="area-expand">
                    <h4>📍 Areas for ${m.name}</h4>
                    ${renderModuleAreas(m)}
                </div>
            </td>
        </tr>
    `}).join('');
}

function renderModuleAreas(module) {
    if (!module.areas || module.areas.length === 0) {
        return '<p style="color:#6b7280;">No areas mapped yet.</p>';
    }
    const moduleId = module.id || module._id;
    return module.areas.map((area, idx) => `
        <div class="area-row">
            <strong>Area ${idx + 1}:</strong> ${area.type} -
            ${area.type === 'circle'? `Radius: ${Math.round(area.radius)}m` : `Polygon with ${area.coordinates?.length || 0} points`}
            <button class="btn-danger" style="float:right;padding:4px 8px;font-size:12px;" onclick="removeArea('${moduleId}', ${idx})">Remove</button>
        </div>
    `).join('');
}

window.toggleModuleAreas = (id) => {
    const row = document.getElementById(`areas-${id}`);
    const icon = document.getElementById(`icon-${id}`);
    if (!row ||!icon) return;
    if (row.style.display === 'none') {
        row.style.display = '';
        icon.classList.add('open');
    } else {
        row.style.display = 'none';
        icon.classList.remove('open');
    }
};

function populateModuleDropdown() {
    const select = document.getElementById('moduleSelectArea');
    select.innerHTML = '<option value="">-- Select Module --</option>' +
        allModules.map(m => `<option value="${m.id || m._id}">${m.icon} ${m.name}</option>`).join('');
}

window.addItem = () => {
    editingId = null;
    document.getElementById('editId').value = '';
    document.getElementById('modalTitle').textContent = 'Add New Module';
    document.getElementById('modalFields').innerHTML = `
        <div class="form-grid">
            <div class="form-group"><label>Name *</label><input type="text" id="field_name" required></div>
            <div class="form-group"><label>Icon *</label><input type="text" id="field_icon" required></div>
            <div class="form-group"><label>Color *</label><input type="color" id="field_color" value="#3b82f6" required></div>
            <div class="form-group"><label>Link *</label><input type="text" id="field_link" required></div>
            <div class="form-group"><label>Priority</label><input type="number" id="field_priority" value="0"></div>
            <div class="form-group"><label>Status</label><select id="field_status"><option value="active">Active</option><option value="hidden">Hidden</option></select></div>
        </div>
    `;
    document.getElementById('editModal').style.display = 'block';
};

window.editItem = (id) => {
    const m = allModules.find(x => x.id === id || x._id === id);
    if (!m) return;
    editingId = id;
    document.getElementById('editId').value = id;
    document.getElementById('modalTitle').textContent = 'Edit Module';
    addItem();
    setTimeout(() => {
        document.getElementById('field_name').value = m.name || '';
        document.getElementById('field_icon').value = m.icon || '';
        document.getElementById('field_color').value = m.color || '#3b82f6';
        document.getElementById('field_link').value = m.link || '';
        document.getElementById('field_priority').value = m.priority || 0;
        document.getElementById('field_status').value = m.status === true || m.status === 'active'? 'active' : 'hidden';
    }, 100);
};

window.saveItem = async () => {
    const data = {
        name: document.getElementById('field_name').value,
        icon: document.getElementById('field_icon').value,
        color: document.getElementById('field_color').value,
        link: document.getElementById('field_link').value,
        priority: parseInt(document.getElementById('field_priority').value || 0),
        status: document.getElementById('field_status').value
    };
    if (!data.name ||!data.icon ||!data.link) {
        showToast('Name, Icon and Link are required', 'error');
        return;
    }
    try {
        if (editingId) {
            await apiCall('/modules/' + editingId, 'PUT', data);
            showToast('Module updated');
        } else {
            await apiCall('/modules', 'POST', data);
            showToast('Module created');
        }
        closeModal();
        loadData();
    } catch (err) { showToast(err.message, 'error'); }
};

window.deleteItem = async (id) => {
    if (!confirm('Delete this module?')) return;
    try {
        await apiCall('/modules/' + id, 'DELETE');
        showToast('Module deleted');
        loadData();
    } catch (err) { showToast(err.message, 'error'); }
};

window.removeArea = async (moduleId, areaIdx) => {
    if (!confirm('Remove this area?')) return;
    try {
        const module = allModules.find(m => m.id === moduleId || m._id === moduleId);
        module.areas.splice(areaIdx, 1);
        await apiCall('/modules/' + moduleId, 'PUT', { areas: module.areas });
        showToast('Area removed');
        loadData();
    } catch (err) { showToast(err.message, 'error'); }
};

function initModuleMap() {
    if (map) return;
    map = L.map('moduleMap').setView([28.6139, 77.2090], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    const drawControl = new L.Control.Draw({
        draw: { polygon: true, circle: true, rectangle: false, polyline: false, marker: false, circlemarker: false },
        edit: { featureGroup: drawnItems }
    });
    map.addControl(drawControl);
    map.on(L.Draw.Event.CREATED, (e) => {
        drawnItems.clearLayers();
        currentDrawnLayer = e.layer;
        drawnItems.addLayer(currentDrawnLayer);
        showAreaInfo(e.layer);
    });
    setTimeout(() => map.invalidateSize(), 200);
}

function showAreaInfo(layer) {
    const info = document.getElementById('areaInfo');
    const details = document.getElementById('areaDetails');
    info.style.display = 'block';
    if (layer instanceof L.Circle) {
        details.textContent = `Circle - Radius: ${Math.round(layer.getRadius())}m`;
    } else if (layer instanceof L.Polygon) {
        details.textContent = `Polygon - ${layer.getLatLngs()[0].length} points`;
    }
}

window.loadModuleArea = () => {
    const moduleId = document.getElementById('moduleSelectArea').value;
    currentModuleId = moduleId;
    drawnItems.clearLayers();
    currentDrawnLayer = null;
    document.getElementById('areaInfo').style.display = 'none';
    if (!moduleId) return;
    const module = allModules.find(m => m.id === moduleId || m._id === moduleId);
    if (module.areas && module.areas.length > 0) {
        const area = module.areas[0];
        if (area.type === 'circle') {
            currentDrawnLayer = L.circle([area.center.lat, area.center.lng], { radius: area.radius });
            map.setView([area.center.lat, area.center.lng], 13);
        } else if (area.type === 'polygon') {
            currentDrawnLayer = L.polygon(area.coordinates);
            map.fitBounds(currentDrawnLayer.getBounds());
        }
        drawnItems.addLayer(currentDrawnLayer);
        showAreaInfo(currentDrawnLayer);
    }
};

window.saveModuleArea = async () => {
    if (!currentModuleId) return showToast('Select module first', 'error');
    if (!currentDrawnLayer) return showToast('Draw area first', 'error');
    let areaData = {};
    if (currentDrawnLayer instanceof L.Circle) {
        const center = currentDrawnLayer.getLatLng();
        areaData = { type: 'circle', center: { lat: center.lat, lng: center.lng }, radius: currentDrawnLayer.getRadius() };
    } else if (currentDrawnLayer instanceof L.Polygon) {
        areaData = { type: 'polygon', coordinates: currentDrawnLayer.getLatLngs()[0].map(p => ({ lat: p.lat, lng: p.lng })) };
    }
    try {
        const module = allModules.find(m => m.id === currentModuleId || m._id === currentModuleId);
        module.areas = [areaData];
        await apiCall('/modules/' + currentModuleId, 'PUT', { areas: module.areas });
        showToast('Area saved');
        loadData();
    } catch (err) { showToast(err.message, 'error'); }
};

window.clearModuleDrawing = () => {
    drawnItems.clearLayers();
    currentDrawnLayer = null;
    document.getElementById('areaInfo').style.display = 'none';
};

window.deleteModuleArea = async () => {
    if (!currentModuleId) return showToast('Select module first', 'error');
    if (!confirm('Remove area?')) return;
    try {
        await apiCall('/modules/' + currentModuleId, 'PUT', { areas: [] });
        showToast('Area removed');
        clearModuleDrawing();
        loadData();
    } catch (err) { showToast(err.message, 'error'); }
};

window.filterTable = (tableId, query) => {
    const rows = document.querySelectorAll(`#${tableId} tbody tr.module-row`);
    const q = query.toLowerCase();
    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(q)? '' : 'none';
        const nextRow = row.nextElementSibling;
        if (nextRow && nextRow.id.startsWith('areas-')) nextRow.style.display = 'none';
    });
};

window.closeModal = () => document.getElementById('editModal').style.display = 'none';
window.onclick = (e) => { if (e.target.classList.contains('modal')) closeModal(); };

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
