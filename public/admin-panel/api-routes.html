<div class="page-header">
    <h2>🔍 API Routes & Models Explorer</h2>
    <div class="page-stats">
        <div class="stat-card">
            <div class="stat-value" id="totalRoutes">0</div>
            <div class="stat-label">Total Routes</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalModels">0</div>
            <div class="stat-label">Models</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="lastUpdate">--:--</div>
            <div class="stat-label">Last Updated</div>
        </div>
    </div>
</div>

<div class="content-card">
    <div class="card-header">
        <input type="text" id="routeSearch" placeholder="🔍 Search by path, method, file..." class="search-input">
        <button class="btn-refresh" onclick="loadApiData()">
            <span>🔄</span> Refresh
        </button>
    </div>

    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th width="140">Method</th>
                    <th>Endpoint Path</th>
                    <th width="180">File</th>
                    <th width="100">Type</th>
                </tr>
            </thead>
            <tbody id="routesTableBody">
                <tr><td colspan="4" class="loading">Loading routes...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="content-card">
    <div class="card-header">
        <h3>🗄️ Database Models</h3>
    </div>
    <div class="models-grid" id="modelsGrid"></div>
</div>

<!-- Code Editor Modal -->
<div id="codeModal">
  <div class="modal-content">
    <div class="modal-header">
      <div>
        <h3 id="modalTitle">Edit Route</h3>
        <p id="modalSubTitle" style="margin:5px 0 0 0; color:#94a3b8; font-size:13px;"></p>
      </div>
      <button onclick="closeModal()" class="btn-close">✕ Close</button>
    </div>
    <textarea id="codeEditor" spellcheck="false"></textarea>
    <div class="modal-footer">
      <div class="warning-text">⚠️ Local Dev Only: Changes will update your VS Code file directly</div>
      <button onclick="saveCode()" class="btn-save">💾 Save to File</button>
    </div>
  </div>
</div>

<script>
(function() {
    let allRoutes = [];
    let currentFile = '';
    let currentRoute = {};

    window.loadApiData = async function() {
        try {
            const res = await fetch('/api/admin/routes');
            const data = await res.json();
            
            if(!data.success) {
                throw new Error(data.error || 'Failed to load');
            }
            
            allRoutes = data.routes;

            document.getElementById('totalRoutes').textContent = data.total;
            document.getElementById('totalModels').textContent = data.models.length;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            renderRoutes(allRoutes);

            document.getElementById('modelsGrid').innerHTML = data.models
             .map(m => `<div class="model-item"><div class="model-name">${m}</div></div>`)
             .join('');

        } catch (err) {
            console.error('Error:', err);
            document.getElementById('routesTableBody').innerHTML =
                `<tr><td colspan="4" style="color: #f87171; text-align: center; padding: 40px;">Failed to load routes: ${err.message}</td></tr>`;
        }
    }

    function renderRoutes(routes) {
        const tbody = document.getElementById('routesTableBody');

        if (routes.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="loading">No routes found</td></tr>';
            return;
        }

        tbody.innerHTML = routes.map(r => `
            <tr onclick='viewCode(${JSON.stringify(r).replace(/'/g, "&#39;")})'>
                <td>${r.methods.map(m => `<span class="method-badge ${m}">${m}</span>`).join(' ')}</td>
                <td><span class="path-text">${r.path}</span></td>
                <td><span class="file-badge">${r.file || 'server.js'}</span></td>
                <td><span class="type-badge">${r.path.includes('/admin')? 'Admin' : r.path.includes('/manager')? 'Manager' : 'Public'}</span></td>
            </tr>
        `).join('');
    }

    window.viewCode = async function(route) {
        currentRoute = route;
        currentFile = route.file || 'server.js';
        
        try {
            const res = await fetch('/api/admin/get-route-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    file: currentFile, 
                    path: route.path, 
                    method: route.methods[0] 
                })
            });
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('modalTitle').textContent = `${route.methods[0]} ${route.path}`;
                document.getElementById('modalSubTitle').textContent = `File: ${currentFile}`;
                document.getElementById('codeEditor').value = data.code;
                document.getElementById('codeModal').style.display = 'block';
            } else {
                alert('Error: ' + data.error);
            }
        } catch(err) {
            alert('Failed to load code: ' + err.message);
        }
    }

    window.saveCode = async function() {
        if(!confirm('Save changes to ' + currentFile + '? This will update the file directly.')) return;
        
        const code = document.getElementById('codeEditor').value;
        try {
            const res = await fetch('/api/admin/update-route-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ file: currentFile, code })
            });
            const data = await res.json();
            
            if(data.success) {
                alert('✅ ' + data.message + '\n\nRestart server to see changes.');
                closeModal();
            } else {
                alert('❌ Error: ' + data.error);
            }
        } catch(err) {
            alert('❌ Failed to save: ' + err.message);
        }
    }

    window.closeModal = function() {
        document.getElementById('codeModal').style.display = 'none';
    }

    // Close on ESC
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') closeModal();
    });

    document.getElementById('routeSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allRoutes.filter(r =>
            r.path.toLowerCase().includes(query) ||
            r.methods.some(m => m.toLowerCase().includes(query)) ||
            (r.file && r.file.toLowerCase().includes(query))
        );
        renderRoutes(filtered);
    });

    loadApiData();
})();
</script>
