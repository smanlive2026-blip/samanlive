<div class="page-header">
    <h2>📁 Project File Explorer</h2>
    <div class="page-stats">
        <div class="stat-card">
            <div class="stat-value" id="totalFiles">0</div>
            <div class="stat-label">Total Files</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="totalFolders">0</div>
            <div class="stat-label">Folders</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="lastUpdate">--:--</div>
            <div class="stat-label">Last Updated</div>
        </div>
    </div>
</div>

<div class="content-card">
    <div class="card-header">
        <input type="text" id="fileSearch" placeholder="🔍 Search files & folders..." class="search-input">
        <div style="display: flex; gap: 10px;">
            <button class="btn-action" onclick="expandAll()">
                <span>📂</span> Expand All
            </button>
            <button class="btn-action" onclick="collapseAll()">
                <span>📁</span> Collapse All
            </button>
            <button class="btn-copy" onclick="copyTreeStructure()">
                <span>📋</span> Copy
            </button>
            <button class="btn-refresh" onclick="loadApiData()">
                <span>🔄</span> Refresh
            </button>
        </div>
    </div>
    <div class="tree-wrapper" id="projectTree">
        <div class="loading">Loading structure...</div>
    </div>
</div>

<!-- Code Editor Modal -->
<div id="codeModal">
  <div class="modal-content">
    <div class="modal-header">
      <div>
        <h3 id="modalTitle">Edit File</h3>
        <p id="modalSubTitle" style="margin:5px 0 0 0; color:#94a3b8; font-size:13px;"></p>
      </div>
      <button onclick="closeModal()" class="btn-close">✕ Close</button>
    </div>
    <textarea id="codeEditor" spellcheck="false"></textarea>
    <div class="modal-footer">
      <div class="warning-text">⚠️ Local Dev Only: Changes will update your VS Code file directly</div>
      <button onclick="saveCode()" class="btn-save">💾 Save to File</button>
    </div>
  </div>
</div>

<script>
(function() {
    let currentFile = '';
    let currentProjectTree = [];
    let originalTree = [];
    let expandedFolders = new Set(); // Track krega kaunse folder khule hain

    window.loadApiData = async function() {
        try {
            const res = await fetch('/api/admin/routes');
            const data = await res.json();

            if(!data.success) {
                throw new Error(data.error || 'Failed to load');
            }

            currentProjectTree = data.projectTree || [];
            originalTree = JSON.parse(JSON.stringify(currentProjectTree));

            const counts = countFilesAndFolders(currentProjectTree);
            document.getElementById('totalFiles').textContent = counts.files;
            document.getElementById('totalFolders').textContent = counts.folders;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

            renderTree(currentProjectTree, document.getElementById('projectTree'));

        } catch (err) {
            console.error('Error:', err);
            document.getElementById('projectTree').innerHTML =
                `<div class="no-results">Failed to load structure: ${err.message}</div>`;
        }
    }

    function countFilesAndFolders(nodes) {
        let files = 0, folders = 0;
        function traverse(arr) {
            arr.forEach(node => {
                if (node.type === 'file') files++;
                if (node.type === 'folder') {
                    folders++;
                    if (node.children) traverse(node.children);
                }
            });
        }
        traverse(nodes);
        return { files, folders };
    }

    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const icons = {
            js: '📄', json: '📋', html: '🌐', css: '🎨', md: '📝',
            png: '🖼️', jpg: '🖼️', jpeg: '🖼️', svg: '🖼️',
            mp4: '🎬', mp3: '🎵', pdf: '📕', zip: '📦',
            env: '⚙️', gitignore: '🚫'
        };
        return icons[ext] || '📄';
    }

    function getFileExtBadge(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (['js','json','html','css','md'].includes(ext)) {
            return `<span class="file-ext ${ext}">${ext}</span>`;
        }
        return '';
    }

    function renderTree(tree, container) {
        if (!tree || tree.length === 0) {
            container.innerHTML = '<div class="no-results">No files found</div>';
            return;
        }

        function createTreeHTML(nodes, parentPath = '') {
            return nodes.map(node => {
                const fullPath = parentPath ? `${parentPath}/${node.name}` : node.name;
                const isExpanded = expandedFolders.has(fullPath);
                
                if (node.type === 'folder') {
                    return `
                        <div class="tree-item tree-folder" data-path="${fullPath}">
                            <span class="tree-icon">${isExpanded ? '▼' : '▶'}</span>
                            <span class="tree-name">📁 ${node.name}</span>
                        </div>
                        <div class="tree-children ${isExpanded ? '' : 'hidden'}">
                            ${createTreeHTML(node.children || [], fullPath)}
                        </div>
                    `;
                } else {
                    return `
                        <div class="tree-item tree-file" data-path="${fullPath}" data-name="${node.name}">
                            <span class="tree-icon">${getFileIcon(node.name)}</span>
                            <span class="tree-name">${node.name}</span>
                            ${getFileExtBadge(node.name)}
                        </div>
                    `;
                }
            }).join('');
        }

        container.innerHTML = createTreeHTML(tree);
        attachTreeEvents();
    }

    function attachTreeEvents() {
        // Folder toggle
        document.querySelectorAll('.tree-folder').forEach(folder => {
            folder.onclick = function(e) {
                e.stopPropagation();
                const path = this.dataset.path;
                const children = this.nextElementSibling;
                const icon = this.querySelector('.tree-icon');
                
                if (children.classList.contains('hidden')) {
                    children.classList.remove('hidden');
                    icon.textContent = '▼';
                    expandedFolders.add(path); // Track karo ki open hai
                } else {
                    children.classList.add('hidden');
                    icon.textContent = '▶';
                    expandedFolders.delete(path); // Track se hatao
                }
            };
        });

        // File click
        document.querySelectorAll('.tree-file').forEach(file => {
            file.onclick = function(e) {
                e.stopPropagation();
                document.querySelectorAll('.tree-file').forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                openFile(this.dataset.path, this.dataset.name);
            };
        });
    }

    window.expandAll = function() {
        // Sab folders ko track me add kar do
        function addAllPaths(nodes, parentPath = '') {
            nodes.forEach(node => {
                const fullPath = parentPath ? `${parentPath}/${node.name}` : node.name;
                if (node.type === 'folder') {
                    expandedFolders.add(fullPath);
                    if (node.children) addAllPaths(node.children, fullPath);
                }
            });
        }
        addAllPaths(currentProjectTree);
        renderTree(currentProjectTree, document.getElementById('projectTree'));
    }

    window.collapseAll = function() {
        expandedFolders.clear(); // Sab clear kar do
        renderTree(currentProjectTree, document.getElementById('projectTree'));
    }

    window.copyTreeStructure = function() {
        function generateVisibleTree(container, prefix = '') {
            let result = '';
            const children = Array.from(container.children);
            
            for (let i = 0; i < children.length; i++) {
                const el = children[i];
                if (!el.classList.contains('tree-item')) continue;
                
                const isFolder = el.classList.contains('tree-folder');
                const nameEl = el.querySelector('.tree-name');
                const name = nameEl ? nameEl.textContent.trim() : '';
                
                let nextEl = el.nextElementSibling;
                let isHidden = true;
                if (nextEl && nextEl.classList.contains('tree-children')) {
                    isHidden = nextEl.classList.contains('hidden');
                    i++;
                }
                
                let isLast = true;
                for (let j = i + 1; j < children.length; j++) {
                    if (children[j].classList.contains('tree-item')) {
                        isLast = false;
                        break;
                    }
                }
                
                const connector = isLast? '└── ' : '├── ';
                result += prefix + connector + name + '\n';
                
                if (isFolder &&!isHidden && nextEl) {
                    const newPrefix = prefix + (isLast? '    ' : '│   ');
                    result += generateVisibleTree(nextEl, newPrefix);
                }
            }
            return result;
        }

        const treeContainer = document.getElementById('projectTree');
        const treeText = 'PROJECT_ROOT/\n' + generateVisibleTree(treeContainer);
        
        navigator.clipboard.writeText(treeText).then(() => {
            alert('✅ Visible structure copied!');
        }).catch(() => {
            alert('❌ Copy failed. Check console.');
            console.log(treeText);
        });
    }

    window.openFile = async function(filePath, fileName) {
        try {
            const res = await fetch('/api/admin/get-route-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ file: filePath })
            });
            const data = await res.json();

            if(data.success) {
                currentFile = filePath;
                document.getElementById('modalTitle').textContent = fileName;
                document.getElementById('modalSubTitle').textContent = `Path: ${filePath}`;
                document.getElementById('codeEditor').value = data.code;
                document.getElementById('codeModal').style.display = 'block';
            } else {
                alert('Error: ' + data.error);
            }
        } catch(err) {
            alert('Failed to load file: ' + err.message);
        }
    }

    window.saveCode = async function() {
        if(!confirm('Save changes to ' + currentFile + '?')) return;

        const code = document.getElementById('codeEditor').value;
        try {
            const res = await fetch('/api/admin/update-route-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ file: currentFile, code })
            });
            const data = await res.json();

            if(data.success) {
                alert('✅ ' + data.message + '\n\nRestart server to see changes.');
                closeModal();
                loadApiData();
            } else {
                alert('❌ Error: ' + data.error);
            }
        } catch(err) {
            alert('❌ Failed to save: ' + err.message);
        }
    }

    window.closeModal = function() {
        document.getElementById('codeModal').style.display = 'none';
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') closeModal();
    });

    // File search
    document.getElementById('fileSearch').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
            renderTree(originalTree, document.getElementById('projectTree'));
            return;
        }

        function filterTree(nodes) {
            return nodes.reduce((acc, node) => {
                if (node.type === 'file') {
                    if (node.name.toLowerCase().includes(query)) {
                        acc.push(node);
                    }
                } else if (node.type === 'folder') {
                    const filteredChildren = filterTree(node.children || []);
                    if (node.name.toLowerCase().includes(query) || filteredChildren.length > 0) {
                        acc.push({
                            ...node,
                            children: filteredChildren
                        });
                    }
                }
                return acc;
            }, []);
        }

        const filtered = filterTree(originalTree);
        
        // Search me sab expand kar do
        expandedFolders.clear();
        function addAllPaths(nodes, parentPath = '') {
            nodes.forEach(node => {
                const fullPath = parentPath ? `${parentPath}/${node.name}` : node.name;
                if (node.type === 'folder') {
                    expandedFolders.add(fullPath);
                    if (node.children) addAllPaths(node.children, fullPath);
                }
            });
        }
        addAllPaths(filtered);
        
        renderTree(filtered, document.getElementById('projectTree'));
    });

    loadApiData();
})();
</script>
