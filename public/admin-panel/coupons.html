<div class="page-header">
    <h2>🎟️ Coupons & Offers Management</h2>
    <button class="btn btn-primary" onclick="showAddCouponModal()">➕ Add Coupon</button>
</div>

<div class="card">
    <div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;">
        <input type="text" id="couponSearch" placeholder="Search Coupon Code..." oninput="searchCoupons()" style="flex:1;min-width:200px;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
        <select id="statusFilter" onchange="filterByStatus()" style="padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            <option value="all">All Coupons</option>
            <option value="active">Active</option>
            <option value="expired">Expired</option>
            <option value="disabled">Disabled</option>
        </select>
        <select id="typeFilter" onchange="filterByType()" style="padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            <option value="all">All Types</option>
            <option value="percentage">Percentage</option>
            <option value="flat">Flat Amount</option>
            <option value="freeshipping">Free Shipping</option>
        </select>
    </div>

    <table id="couponsTable" style="width:100%;border-collapse:collapse;">
        <thead>
            <tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0;">
                <th style="padding:12px;text-align:left;">Code</th>
                <th style="padding:12px;text-align:left;">Type</th>
                <th style="padding:12px;text-align:left;">Discount</th>
                <th style="padding:12px;text-align:left;">Min Order</th>
                <th style="padding:12px;text-align:left;">Usage</th>
                <th style="padding:12px;text-align:left;">Expiry</th>
                <th style="padding:12px;text-align:left;">Status</th>
                <th style="padding:12px;text-align:left;">Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Add/Edit Coupon Modal -->
<div id="couponModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div style="background:white;padding:24px;border-radius:12px;max-width:500px;width:90%;max-height:90vh;overflow-y:auto;">
        <h3 id="modalTitle">Add Coupon</h3>
        <form id="couponForm" onsubmit="saveCoupon(event)">
            <input type="hidden" id="couponId">
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Coupon Code *</label>
                <input type="text" id="couponCode" required placeholder="SAVE20" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;text-transform:uppercase;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Description</label>
                <input type="text" id="couponDesc" placeholder="Get 20% off on all orders" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Discount Type *</label>
                <select id="discountType" required onchange="toggleDiscountField()" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                    <option value="">Select Type</option>
                    <option value="percentage">Percentage (%)</option>
                    <option value="flat">Flat Amount (₹)</option>
                    <option value="freeshipping">Free Shipping</option>
                </select>
            </div>
            <div style="margin-bottom:12px;" id="discountValueField">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Discount Value *</label>
                <input type="number" id="discountValue" required style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="display:flex;gap:10px;margin-bottom:12px;">
                <div style="flex:1;">
                    <label style="display:block;margin-bottom:4px;font-weight:500;">Min Order Amount</label>
                    <input type="number" id="minOrder" placeholder="0" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                </div>
                <div style="flex:1;">
                    <label style="display:block;margin-bottom:4px;font-weight:500;">Max Discount</label>
                    <input type="number" id="maxDiscount" placeholder="Optional" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                </div>
            </div>
            <div style="display:flex;gap:10px;margin-bottom:12px;">
                <div style="flex:1;">
                    <label style="display:block;margin-bottom:4px;font-weight:500;">Usage Limit</label>
                    <input type="number" id="usageLimit" placeholder="Unlimited" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                </div>
                <div style="flex:1;">
                    <label style="display:block;margin-bottom:4px;font-weight:500;">Per User Limit</label>
                    <input type="number" id="userLimit" placeholder="1" value="1" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
                </div>
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:4px;font-weight:500;">Expiry Date</label>
                <input type="date" id="expiryDate" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            </div>
            <div style="margin-bottom:12px;">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                    <input type="checkbox" id="isActive" checked>
                    <span style="font-weight:500;">Active Coupon</span>
                </label>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;">
                <button type="submit" style="flex:1;padding:10px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Save Coupon</button>
                <button type="button" onclick="closeCouponModal()" style="flex:1;padding:10px;background:#e2e8f0;border:none;border-radius:6px;cursor:pointer;font-weight:600;">Cancel</button>
            </div>
        </form>
    </div>
</div>

<style>
.btn-icon { padding: 6px 10px; border: none; background: #f1f5f9; border-radius: 6px; cursor: pointer; margin: 0 2px; }
.btn-icon:hover { background: #e2e8f0; }
.badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.status-active { background: #d1fae5; color: #065f46; }
.status-expired { background: #fee2e2; color: #991b1b; }
.status-disabled { background: #f1f5f9; color: #475569; }
.type-percentage { background: #dbeafe; color: #1e40af; }
.type-flat { background: #fef3c7; color: #92400e; }
.type-freeshipping { background: #fce7f3; color: #9f1239; }
</style>

<script>
let allCoupons = [];

async function loadCoupons() {
    const tbody = document.querySelector('#couponsTable tbody');
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;">Loading...</td></tr>`;
    try {
        allCoupons = await apiCall('/coupons') || [];
        renderCoupons(allCoupons);
        showToast(`${allCoupons.length} coupons loaded`, 'success');
    } catch(err) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#ef4444;">Failed to load coupons</td></tr>`;
    }
}

function renderCoupons(coupons) {
    const tbody = document.querySelector('#couponsTable tbody');
    if(coupons.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#64748b;">Koi coupon nahi mila 😔</td></tr>`;
        return;
    }
    const now = new Date();
    tbody.innerHTML = coupons.map(c => {
        const isExpired = c.expiryDate && new Date(c.expiryDate) < now;
        const status = !c.isActive ? 'disabled' : isExpired ? 'expired' : 'active';
        const discountText = c.discountType === 'percentage' ? `${c.discountValue}%` : 
                           c.discountType === 'flat' ? `₹${c.discountValue}` : 'Free Ship';
        return `
            <tr>
                <td><strong style="font-family:monospace;font-size:14px;">${escapeHtml(c.code)}</strong></td>
                <td><span class="badge type-${c.discountType}">${c.discountType}</span></td>
                <td>${discountText} ${c.maxDiscount ? `<br><small>Max ₹${c.maxDiscount}</small>` : ''}</td>
                <td>₹${c.minOrderAmount || 0}</td>
                <td>${c.usedCount || 0}${c.usageLimit ? ` / ${c.usageLimit}` : ''}</td>
                <td>${c.expiryDate ? formatDate(c.expiryDate) : 'No Expiry'}</td>
                <td><span class="badge status-${status}">${status}</span></td>
                <td>
                    <button class="btn-icon" onclick="editCoupon('${c._id}')" title="Edit">✏️</button>
                    <button class="btn-icon" onclick="toggleCoupon('${c._id}', ${!c.isActive})" title="${c.isActive ? 'Disable' : 'Enable'}" style="background:${c.isActive ? '#fee2e2' : '#d1fae5'};">${c.isActive ? '🚫' : '✅'}</button>
                    <button class="btn-icon" onclick="deleteCoupon('${c._id}')" title="Delete" style="background:#fee2e2;">🗑️</button>
                </td>
            </tr>
        `;
    }).join('');
}

function showAddCouponModal() {
    document.getElementById('modalTitle').textContent = 'Add Coupon';
    document.getElementById('couponForm').reset();
    document.getElementById('couponId').value = '';
    document.getElementById('isActive').checked = true;
    document.getElementById('couponModal').style.display = 'flex';
}

function closeCouponModal() {
    document.getElementById('couponModal').style.display = 'none';
}

function toggleDiscountField() {
    const type = document.getElementById('discountType').value;
    const field = document.getElementById('discountValueField');
    field.style.display = type === 'freeshipping' ? 'none' : 'block';
    document.getElementById('discountValue').required = type !== 'freeshipping';
}

function editCoupon(id) {
    const coupon = allCoupons.find(c => c._id === id);
    if(!coupon) return;
    document.getElementById('modalTitle').textContent = 'Edit Coupon';
    document.getElementById('couponId').value = coupon._id;
    document.getElementById('couponCode').value = coupon.code;
    document.getElementById('couponDesc').value = coupon.description || '';
    document.getElementById('discountType').value = coupon.discountType;
    document.getElementById('discountValue').value = coupon.discountValue || '';
    document.getElementById('minOrder').value = coupon.minOrderAmount || '';
    document.getElementById('maxDiscount').value = coupon.maxDiscount || '';
    document.getElementById('usageLimit').value = coupon.usageLimit || '';
    document.getElementById('userLimit').value = coupon.perUserLimit || 1;
    document.getElementById('expiryDate').value = coupon.expiryDate ? new Date(coupon.expiryDate).toISOString().split('T')[0] : '';
    document.getElementById('isActive').checked = coupon.isActive;
    toggleDiscountField();
    document.getElementById('couponModal').style.display = 'flex';
}

async function saveCoupon(e) {
    e.preventDefault();
    const id = document.getElementById('couponId').value;
    const type = document.getElementById('discountType').value;
    const data = {
        code: document.getElementById('couponCode').value.toUpperCase(),
        description: document.getElementById('couponDesc').value,
        discountType: type,
        discountValue: type !== 'freeshipping' ? Number(document.getElementById('discountValue').value) : 0,
        minOrderAmount: Number(document.getElementById('minOrder').value) || 0,
        maxDiscount: Number(document.getElementById('maxDiscount').value) || undefined,
        usageLimit: Number(document.getElementById('usageLimit').value) || undefined,
        perUserLimit: Number(document.getElementById('userLimit').value) || 1,
        expiryDate: document.getElementById('expiryDate').value || undefined,
        isActive: document.getElementById('isActive').checked
    };
    try {
        if(id) {
            await apiCall(`/coupons/${id}`, 'PUT', data);
            showToast('Coupon updated!', 'success');
        } else {
            await apiCall('/coupons', 'POST', data);
            showToast('Coupon created!', 'success');
        }
        closeCouponModal();
        loadCoupons();
    } catch(err) {
        showToast('Failed to save coupon', 'error');
    }
}

async function toggleCoupon(id, enable) {
    try {
        await apiCall(`/coupons/${id}`, 'PUT', { isActive: enable });
        showToast(enable ? 'Coupon enabled!' : 'Coupon disabled!', 'success');
        loadCoupons();
    } catch(err) {
        showToast('Failed to update', 'error');
    }
}

async function deleteCoupon(id) {
    if(!confirm('Delete this coupon?')) return;
    try {
        await apiCall(`/coupons/${id}`, 'DELETE');
        showToast('Coupon deleted!', 'success');
        loadCoupons();
    } catch(err) {
        showToast('Failed to delete', 'error');
    }
}

function searchCoupons() {
    const query = document.getElementById('couponSearch').value.toLowerCase();
    const filtered = allCoupons.filter(c => 
        c.code.toLowerCase().includes(query) || 
        c.description?.toLowerCase().includes(query)
    );
    renderCoupons(filtered);
}

function filterByStatus() {
    const status = document.getElementById('statusFilter').value;
    const now = new Date();
    if(status === 'all') renderCoupons(allCoupons);
    else if(status === 'active') renderCoupons(allCoupons.filter(c => c.isActive && (!c.expiryDate || new Date(c.expiryDate) > now)));
    else if(status === 'expired') renderCoupons(allCoupons.filter(c => c.expiryDate && new Date(c.expiryDate) < now));
    else renderCoupons(allCoupons.filter(c => !c.isActive));
}

function filterByType() {
    const type = document.getElementById('typeFilter').value;
    if(type === 'all') renderCoupons(allCoupons);
    else renderCoupons(allCoupons.filter(c => c.discountType === type));
}

// Auto load
loadCoupons();
</script>
