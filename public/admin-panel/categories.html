<div class="content">
    <h2>📂 All Categories <span id="categoryCount" class="badge badge-info">0</span></h2>
    <div class="action-bar">
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="openImportCategories()">📥 Import 1008 Categories</button>
            <select id="moduleFilter" onchange="filterByModule(this.value)" style="padding:10px;border:2px solid #e2e8f0;border-radius:8px;min-width:200px;">
                <option value="">All Modules</option>
            </select>
        </div>
        <input type="text" class="search-box" placeholder="Search categories..." onkeyup="filterTable('categoriesTable', this.value)">
    </div>
    <div style="overflow-x:auto;">
        <table id="categoriesTable">
            <thead>
                <tr>
                    <th>Icon</th>
                    <th>Name</th>
                    <th>Module</th>
                    <th>Group</th>
                    <th>Color</th>
                    <th>Priority</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="7" class="loading">Loading categories</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Import Categories Modal -->
<div id="importModal" class="modal">
    <div class="modal-content" style="max-width:650px;">
        <div class="modal-header">
            <h2>📥 Import User App Categories</h2>
            <button class="close-btn" onclick="closeImportModal()">×</button>
        </div>
        <div style="margin-bottom:20px;">
            <p style="color:#64748b;margin-bottom:15px;">Ye 1008 categories user app se hain. Ye unke <b>Group</b> ke basis pe existing modules me add ho jayengi.</p>
            <div id="importPreview" style="background:#f8fafc;padding:15px;border-radius:8px;max-height:300px;overflow-y:auto;border:1px solid #e2e8f0;"></div>
        </div>
        <div style="display:flex;gap:10px;padding-top:20px;border-top:2px solid #f1f5f9;">
            <button class="btn btn-primary" id="confirmImportBtn" onclick="importCategories()">✅ Import Now</button>
            <button class="btn btn-secondary" onclick="closeImportModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- Edit Category Modal -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Category</h2>
            <button class="close-btn" onclick="closeCategoryModal()">×</button>
        </div>
        <input type="hidden" id="catModuleId">
        <input type="hidden" id="catIndex">
        <div class="form-grid">
            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="catName" required placeholder="e.g. Dairy Products">
            </div>
            <div class="form-group">
                <label>Icon * (Emoji)</label>
                <input type="text" id="catIcon" required maxlength="2" placeholder="🥛">
            </div>
            <div class="form-group">
                <label>Color *</label>
                <input type="color" id="catColor" required>
            </div>
            <div class="form-group">
                <label>Group</label>
                <input type="text" id="catGroup" placeholder="e.g. Fresh">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <input type="number" id="catPriority" min="0" placeholder="0">
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:25px;padding-top:20px;border-top:2px solid #f1f5f9;">
            <button class="btn btn-primary" id="saveCatBtn" onclick="saveCategory()">💾 Save Changes</button>
            <button class="btn btn-secondary" onclick="closeCategoryModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- FIX 1: type="module" add kiya kyunki teri category.js me export default hai -->
<script type="module">
import CATEGORIES_FALLBACK from './category.js';
window.CATEGORIES_FALLBACK = CATEGORIES_FALLBACK;
</script>

<script>
// ========================================
// CATEGORY MANAGEMENT + IMPORT
// ========================================
let moduleFilter = '';

async function loadCategories() {
    showLoading('categoriesTable');
    try {
        if (!window.allModules || window.allModules.length === 0) {
            const data = await apiCall('/modules');
            window.allModules = data.modules || data;
        }

        window.allCategories = [];
        window.allModules.forEach(m => {
            (m.categoryDetails || []).forEach((c, idx) => {
                window.allCategories.push({
                 ...c,
                    moduleId: m._id || m.id,
                    moduleName: m.name,
                    moduleIcon: m.icon,
                    catIndex: idx
                });
            });
        });

        document.getElementById('categoryCount').textContent = window.allCategories.length;
        populateModuleFilter();
        renderCategories();
    } catch (err) {
        console.error('Load categories error:', err);
        document.querySelector('#categoriesTable tbody').innerHTML =
            `<tr><td colspan="7" style="text-align:center;padding:40px;color:#ef4444;">Failed to load categories: ${escapeHtml(err.message)}</td></tr>`;
    }
}

function populateModuleFilter() {
    const select = document.getElementById('moduleFilter');
    select.innerHTML = '<option value="">All Modules</option>' +
        window.allModules.map(m => `<option value="${m._id || m.id}">${m.icon} ${escapeHtml(m.name)}</option>`).join('');
}

function renderCategories() {
    const tbody = document.querySelector('#categoriesTable tbody');

    if (!window.allCategories || window.allCategories.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8;">No categories found. Click "Import 1008 Categories" to add.</td></tr>';
        return;
    }

    let filtered = moduleFilter? window.allCategories.filter(c => c.moduleId === moduleFilter) : window.allCategories;

    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8;">No categories in selected module.</td></tr>';
        return;
    }

    tbody.innerHTML = filtered.map(c => `
        <tr>
            <td style="font-size:24px;">${c.icon}</td>
            <td><b>${escapeHtml(c.name)}</b></td>
            <td>${c.moduleIcon} ${escapeHtml(c.moduleName)}</td>
            <td>${escapeHtml(c.group || '-')}</td>
            <td><span class="color-badge" style="background:${c.color}">${c.color}</span></td>
            <td>${c.priority || 0}</td>
            <td class="actions">
                <button class="btn btn-primary btn-sm" onclick="editCategory('${c.moduleId}', ${c.catIndex})">Edit</button>
            </td>
        </tr>`).join('');
}

window.filterByModule = (val) => {
    moduleFilter = val;
    renderCategories();
};

// ========================================
// IMPORT FUNCTIONALITY - FIXED
// ========================================
window.openImportCategories = () => {
    // FIX 2: Check karo ki CATEGORIES_FALLBACK load hua ya nahi
    if (!window.CATEGORIES_FALLBACK || window.CATEGORIES_FALLBACK.length === 0) {
        showToast('Categories file not loaded. Check category.js path', 'error');
        return;
    }

    const preview = document.getElementById('importPreview');
    const groupCount = {};
    window.CATEGORIES_FALLBACK.forEach(cat => {
        const group = cat.group || 'General';
        groupCount[group] = (groupCount[group] || 0) + 1;
    });

    preview.innerHTML = Object.entries(groupCount).map(([group, count]) => {
        const moduleExists = window.allModules.some(m => m.name.toLowerCase() === group.toLowerCase());
        return `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #e2e8f0;">
            <span><b>${group}</b> ${moduleExists? '✅' : '⚠️ Not Found'}</span>
            <span class="badge badge-info">${count} cats</span>
        </div>`;
    }).join('') + `<p style="margin-top:12px;font-size:13px;color:#64748b;">Total: ${window.CATEGORIES_FALLBACK.length} categories | ✅ = Module exists | ⚠️ = Module missing, will skip</p>`;

    document.getElementById('importModal').classList.add('active');
};

window.closeImportModal = () => {
    document.getElementById('importModal').classList.remove('active');
};

window.importCategories = async () => {
    const btn = document.getElementById('confirmImportBtn');
    btn.disabled = true;
    btn.textContent = 'Importing...';

    let imported = 0;
    let skipped = 0;

    try {
        for(const cat of window.CATEGORIES_FALLBACK) {
            const groupName = cat.group || 'General';
            const module = window.allModules.find(m => m.name.toLowerCase() === groupName.toLowerCase());

            if(!module) {
                skipped++;
                continue;
            }

            const exists = (module.categoryDetails || []).some(c => c.name.toLowerCase() === cat.name.toLowerCase());
            if(exists) {
                skipped++;
                continue;
            }

            const newCat = {
                id: cat.id,
                name: cat.name,
                icon: cat.icon,
                color: cat.color,
                group: cat.group,
                priority: 0
            };

            const updatedCats = [...(module.categoryDetails || []), newCat];
            await apiCall('/modules/' + (module._id || module.id), 'PUT', { categoryDetails: updatedCats });
            imported++;
        }

        showToast(`✅ Imported: ${imported} | ⏭️ Skipped: ${skipped}`, 'success');
        closeImportModal();
        await loadCategories();

    } catch (err) {
        showToast('Import failed: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '✅ Import Now';
    }
};

// ========================================
// EDIT CATEGORY
// ========================================
window.editCategory = (moduleId, catIndex) => {
    const m = window.allModules.find(x => (x._id || x.id) === moduleId);
    if (!m ||!m.categoryDetails ||!m.categoryDetails[catIndex]) {
        showToast('Category not found', 'error');
        return;
    }

    const c = m.categoryDetails[catIndex];
    document.getElementById('catModuleId').value = moduleId;
    document.getElementById('catIndex').value = catIndex;
    document.getElementById('catName').value = c.name || '';
    document.getElementById('catIcon').value = c.icon || '📦';
    document.getElementById('catColor').value = c.color || '#6366f1';
    document.getElementById('catGroup').value = c.group || '';
    document.getElementById('catPriority').value = c.priority || 0;
    document.getElementById('categoryModal').classList.add('active');
};

window.saveCategory = async () => {
    const btn = document.getElementById('saveCatBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const moduleId = document.getElementById('catModuleId').value;
    const catIndex = parseInt(document.getElementById('catIndex').value);
    const m = window.allModules.find(x => (x._id || x.id) === moduleId);

    if (!m) {
        showToast('Module not found', 'error');
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
        return;
    }

    const updatedCategory = {
     ...m.categoryDetails[catIndex],
        name: document.getElementById('catName').value.trim(),
        icon: document.getElementById('catIcon').value.trim(),
        color: document.getElementById('catColor').value,
        group: document.getElementById('catGroup').value.trim(),
        priority: parseInt(document.getElementById('catPriority').value || 0)
    };

    if (!updatedCategory.name ||!updatedCategory.icon) {
        showToast('Name and Icon are required', 'error');
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
        return;
    }

    m.categoryDetails[catIndex] = updatedCategory;

    try {
        await apiCall('/modules/' + moduleId, 'PUT', { categoryDetails: m.categoryDetails });
        showToast('Category updated successfully!');
        closeCategoryModal();
        await loadCategories();
    } catch (err) {
        showToast('Failed to update category: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
    }
};

window.closeCategoryModal = () => {
    document.getElementById('categoryModal').classList.remove('active');
};

// FIX 3: Responsive CSS add kiya
const style = document.createElement('style');
style.textContent = `
@media (max-width: 768px) {
   .action-bar {
        flex-direction: column!important;
    }
   .action-bar > div {
        width: 100%;
    }
   .search-box {
        width: 100%!important;
        margin-top: 10px;
    }
    table {
        font-size: 12px;
    }
   .btn-sm {
        padding: 4px 8px;
        font-size: 11px;
    }
   .modal-content {
        width: 95%!important;
        margin: 10px;
    }
}
`;
document.head.appendChild(style);

loadCategories();
</script>
