<div class="content">
    <h2>📂 Modules & Categories Management</h2>

    <div class="action-bar" style="margin-bottom:20px;">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
            <input type="text" class="search-box" placeholder="Search modules..." onkeyup="filterModules(this.value)" style="min-width:250px;">
        </div>
    </div>

    <!-- Categories Grid By Group -->
    <div style="margin-bottom:30px;">
        <h3 style="margin:0 0 15px 0;font-size:20px;">📋 All Categories by Group</h3>
        <div id="categoriesGridByGroup" style="display:grid;gap:20px;">
            <div class="loading" style="text-align:center;padding:40px;">Loading categories...</div>
        </div>
    </div>

    <!-- Modules List -->
    <div>
        <h3 style="margin:0 0 15px 0;font-size:20px;">🧩 Modules</h3>
        <div id="modulesList" style="display:grid;gap:15px;">
            <div class="loading" style="text-align:center;padding:40px;">Loading modules...</div>
        </div>
    </div>
</div>

<!-- Add/Edit Category Modal -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="categoryModalTitle">Add Category</h2>
            <button class="close-btn" onclick="closeCategoryModal()">×</button>
        </div>
        <input type="hidden" id="catModuleId">
        <input type="hidden" id="catIndex">
        <div class="form-grid">
            <div class="form-group">
                <label>Select from Database *</label>
                <select id="catSelectFromList" onchange="fillCategoryFromList(this.value)" style="padding:10px;border:2px solid #e2e8f0;border-radius:8px;">
                    <option value="">-- Choose Category --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Name *</label>
                <input type="text" id="catName" required placeholder="e.g. Kirana Store">
            </div>
            <div class="form-group">
                <label>Icon * (Emoji)</label>
                <input type="text" id="catIcon" required maxlength="2" placeholder="🏪">
            </div>
            <div class="form-group">
                <label>Color *</label>
                <input type="color" id="catColor" required value="#6366f1">
            </div>
            <div class="form-group">
                <label>Group</label>
                <input type="text" id="catGroup" placeholder="e.g. Grocery">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <input type="number" id="catPriority" min="0" placeholder="0">
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:25px;padding-top:20px;border-top:2px solid #f1f5f9;">
            <button class="btn btn-primary" id="saveCatBtn" onclick="saveCategory()">💾 Save Category</button>
            <button class="btn btn-secondary" onclick="closeCategoryModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="assets/categories-data.js"></script>
<script>
// ========================================
// MODULE + CATEGORY MANAGEMENT
// ========================================
let allModulesData = [];
let expandedModule = null;

async function loadModules() {
    const container = document.getElementById('modulesList');
    if (!container) return;
    
    container.innerHTML = '<div class="loading" style="text-align:center;padding:40px;">Loading modules...</div>';

    try {
        const moduleData = await apiCall('/modules');
        allModulesData = moduleData.modules || moduleData || [];

        renderModules();
        renderCategoriesGrid();
        populateCategoryDropdown();
    } catch (err) {
        console.error('Load modules error:', err);
        container.innerHTML = `<div style="text-align:center;padding:40px;color:#ef4444;">Failed to load: ${escapeHtml(err.message)}</div>`;
    }
}

function renderCategoriesGrid() {
    const container = document.getElementById('categoriesGridByGroup');
    if (!container) return;

    if (!window.CATEGORIES_FALLBACK || window.CATEGORIES_FALLBACK.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">No categories found in categories-data.js</div>';
        return;
    }

    // Group by 'group' field
    const grouped = {};
    window.CATEGORIES_FALLBACK.forEach(cat => {
        const group = cat.group || 'General';
        if (!grouped[group]) grouped[group] = [];
        grouped[group].push(cat);
    });

    container.innerHTML = Object.entries(grouped).map(([groupName, cats]) => `
        <div style="background:#fff;border:2px solid #e2e8f0;border-radius:12px;overflow:hidden;">
            <div style="padding:16px;background:#f8fafc;border-bottom:2px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">
                <h4 style="margin:0;font-size:16px;">${escapeHtml(groupName)}</h4>
                <span style="background:#6366f1;color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;">${cats.length} items</span>
            </div>
            <div style="padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;">
                ${cats.map(c => `
                    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;text-align:center;transition:0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(0,0,0,0.08)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
                        <div style="font-size:32px;margin-bottom:8px;">${c.icon}</div>
                        <div style="font-size:13px;font-weight:600;color:#1e293b;line-height:1.3;">${escapeHtml(c.name)}</div>
                        <div style="margin-top:6px;width:100%;height:4px;background:${c.color};border-radius:2px;"></div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function populateCategoryDropdown() {
    const select = document.getElementById('catSelectFromList');
    if (!select) return;
    
    if (!window.CATEGORIES_FALLBACK || window.CATEGORIES_FALLBACK.length === 0) {
        select.innerHTML = '<option value="">⚠️ No categories found</option>';
        return;
    }

    select.innerHTML = '<option value="">-- Choose Category --</option>' +
        window.CATEGORIES_FALLBACK.map((c, idx) =>
            `<option value="${idx}">${c.icon} ${escapeHtml(c.name)} - ${c.group}</option>`
        ).join('');
}

function fillCategoryFromList(index) {
    if (index === '') return;
    const cat = window.CATEGORIES_FALLBACK[parseInt(index)];
    document.getElementById('catName').value = cat.name;
    document.getElementById('catIcon').value = cat.icon;
    document.getElementById('catColor').value = cat.color;
    document.getElementById('catGroup').value = cat.group;
}

function renderModules(searchTerm = '') {
    const container = document.getElementById('modulesList');
    if (!container) return;

    let filtered = allModulesData;
    if (searchTerm) {
        filtered = allModulesData.filter(m =>
            m.name.toLowerCase().includes(searchTerm.toLowerCase())
        );
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">No modules found</div>';
        return;
    }

    container.innerHTML = filtered.map(m => {
        const moduleId = m._id || m.id;
        const categories = m.categoryDetails || [];
        const isExpanded = expandedModule === moduleId;

        return `
        <div class="module-card" style="background:#fff;border:2px solid #e2e8f0;border-radius:12px;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;background:#f8fafc;cursor:pointer;" onclick="toggleModule('${moduleId}')">
                <div style="display:flex;align-items:center;gap:12px;">
                    <span style="font-size:28px;">${m.icon}</span>
                    <div>
                        <h3 style="margin:0;font-size:18px;">${escapeHtml(m.name)}</h3>
                        <p style="margin:0;color:#64748b;font-size:13px;">${categories.length} categories</p>
                    </div>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <button class="btn btn-success btn-sm" onclick="event.stopPropagation(); openAddCategory('${moduleId}')">➕ Add Category</button>
                    <span style="font-size:20px;transform:rotate(${isExpanded? '180deg' : '0deg'});transition:0.3s;">▼</span>
                </div>
            </div>

            ${isExpanded? `
            <div style="padding:16px;border-top:2px solid #e2e8f0;">
                ${categories.length === 0?
                    '<p style="text-align:center;color:#94a3b8;padding:20px;">No categories yet. Click "Add Category" to add.</p>' :
                    `<div style="overflow-x:auto;">
                        <table style="width:100%;border-collapse:collapse;">
                            <thead>
                                <tr style="background:#f8fafc;">
                                    <th style="padding:10px;text-align:left;">Icon</th>
                                    <th style="padding:10px;text-align:left;">Name</th>
                                    <th style="padding:10px;text-align:left;">Group</th>
                                    <th style="padding:10px;text-align:left;">Color</th>
                                    <th style="padding:10px;text-align:left;">Priority</th>
                                    <th style="padding:10px;text-align:left;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${categories.map((c, idx) => `
                                    <tr style="border-bottom:1px solid #e2e8f0;">
                                        <td style="padding:10px;font-size:22px;">${c.icon}</td>
                                        <td style="padding:10px;"><b>${escapeHtml(c.name)}</b></td>
                                        <td style="padding:10px;">${escapeHtml(c.group || '-')}</td>
                                        <td style="padding:10px;"><span class="color-badge" style="background:${c.color};padding:4px 12px;border-radius:6px;color:#fff;font-size:12px;">${c.color}</span></td>
                                        <td style="padding:10px;">${c.priority || 0}</td>
                                        <td style="padding:10px;">
                                            <button class="btn btn-primary btn-sm" onclick="editCategory('${moduleId}', ${idx})">Edit</button>
                                            <button class="btn btn-danger btn-sm" onclick="deleteCategory('${moduleId}', ${idx})">Delete</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>`
                }
            </div>
            ` : ''}
        </div>
        `;
    }).join('');
}

window.toggleModule = (moduleId) => {
    expandedModule = expandedModule === moduleId? null : moduleId;
    const searchBox = document.querySelector('.search-box');
    renderModules(searchBox? searchBox.value : '');
};

window.filterModules = (val) => {
    renderModules(val);
};

// ========================================
// ADD/EDIT/DELETE CATEGORY - PERMANENT SAVE
// ========================================
window.openAddCategory = (moduleId) => {
    document.getElementById('categoryModalTitle').textContent = 'Add Category to Module';
    document.getElementById('catModuleId').value = moduleId;
    document.getElementById('catIndex').value = '';
    document.getElementById('catName').value = '';
    document.getElementById('catIcon').value = '📦';
    document.getElementById('catColor').value = '#6366f1';
    document.getElementById('catGroup').value = '';
    document.getElementById('catPriority').value = '0';
    document.getElementById('catSelectFromList').value = '';
    document.getElementById('categoryModal').classList.add('active');
};

window.editCategory = (moduleId, catIndex) => {
    const m = allModulesData.find(x => (x._id || x.id) === moduleId);
    if (!m ||!m.categoryDetails ||!m.categoryDetails[catIndex]) {
        showToast('Category not found', 'error');
        return;
    }

    const c = m.categoryDetails[catIndex];
    document.getElementById('categoryModalTitle').textContent = 'Edit Category';
    document.getElementById('catModuleId').value = moduleId;
    document.getElementById('catIndex').value = catIndex;
    document.getElementById('catName').value = c.name || '';
    document.getElementById('catIcon').value = c.icon || '📦';
    document.getElementById('catColor').value = c.color || '#6366f1';
    document.getElementById('catGroup').value = c.group || '';
    document.getElementById('catPriority').value = c.priority || 0;
    document.getElementById('catSelectFromList').value = '';
    document.getElementById('categoryModal').classList.add('active');
};

window.saveCategory = async () => {
    const btn = document.getElementById('saveCatBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const moduleId = document.getElementById('catModuleId').value;
    const catIndex = document.getElementById('catIndex').value;
    const m = allModulesData.find(x => (x._id || x.id) === moduleId);

    if (!m) {
        showToast('Module not found', 'error');
        btn.disabled = false;
        btn.textContent = '💾 Save Category';
        return;
    }

    const newCategory = {
        id: 'cat_' + Date.now(),
        name: document.getElementById('catName').value.trim(),
        icon: document.getElementById('catIcon').value.trim(),
        color: document.getElementById('catColor').value,
        group: document.getElementById('catGroup').value.trim(),
        priority: parseInt(document.getElementById('catPriority').value || 0)
    };

    if (!newCategory.name ||!newCategory.icon) {
        showToast('Name and Icon are required', 'error');
        btn.disabled = false;
        btn.textContent = '💾 Save Category';
        return;
    }

    if (!m.categoryDetails) m.categoryDetails = [];

    if (catIndex === '') {
        m.categoryDetails.push(newCategory);
    } else {
        m.categoryDetails[parseInt(catIndex)] = {...m.categoryDetails[parseInt(catIndex)],...newCategory};
    }

    try {
        await apiCall('/modules/' + moduleId, 'PUT', { categoryDetails: m.categoryDetails });
        showToast(catIndex === ''? 'Category added & saved!' : 'Category updated & saved!', 'success');
        closeCategoryModal();
        await loadModules();
        expandedModule = moduleId;
        renderModules();
    } catch (err) {
        showToast('Failed: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '💾 Save Category';
    }
};

window.deleteCategory = async (moduleId, catIndex) => {
    if (!confirm('Delete this category? This will be permanent.')) return;

    const m = allModulesData.find(x => (x._id || x.id) === moduleId);
    if (!m ||!m.categoryDetails) return;
    
    m.categoryDetails.splice(catIndex, 1);

    try {
        await apiCall('/modules/' + moduleId, 'PUT', { categoryDetails: m.categoryDetails });
        showToast('Category deleted permanently!', 'success');
        await loadModules();
        expandedModule = moduleId;
        renderModules();
    } catch (err) {
        showToast('Failed: ' + err.message, 'error');
    }
};

window.closeCategoryModal = () => {
    document.getElementById('categoryModal').classList.remove('active');
};

// RESPONSIVE CSS
const style = document.createElement('style');
style.textContent = `
@media (max-width: 768px) {
.action-bar > div {
        width: 100%;
    }
.search-box {
        width: 100%!important;
    }
.modal-content {
        width: 95%!important;
        margin: 10px;
    }
.module-card h3 {
        font-size: 16px!important;
    }
#categoriesGridByGroup > div > div:last-child {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr))!important;
    }
}
`;
document.head.appendChild(style);

loadModules();
</script>
