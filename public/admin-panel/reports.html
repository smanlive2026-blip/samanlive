<div class="page-header">
    <h2>📊 Reports & Analytics</h2>
    <button class="btn btn-primary" onclick="loadReports()">🔄 Refresh Data</button>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:20px;">
    <div class="card" style="padding:20px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">💰</div>
        <div style="font-size:28px;font-weight:700;color:#10b981;" id="totalRevenue">₹0</div>
        <div style="color:#64748b;font-size:14px;">Total Revenue</div>
        <div style="color:#10b981;font-size:12px;margin-top:4px;" id="revenueChange">+0%</div>
    </div>
    <div class="card" style="padding:20px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">📦</div>
        <div style="font-size:28px;font-weight:700;color:#3b82f6;" id="totalOrders">0</div>
        <div style="color:#64748b;font-size:14px;">Total Orders</div>
        <div style="color:#3b82f6;font-size:12px;margin-top:4px;" id="ordersChange">+0%</div>
    </div>
    <div class="card" style="padding:20px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">👥</div>
        <div style="font-size:28px;font-weight:700;color:#8b5cf6;" id="totalUsers">0</div>
        <div style="color:#64748b;font-size:14px;">Total Users</div>
        <div style="color:#8b5cf6;font-size:12px;margin-top:4px;" id="usersChange">+0%</div>
    </div>
    <div class="card" style="padding:20px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">⭐</div>
        <div style="font-size:28px;font-weight:700;color:#f59e0b;" id="avgRating">0.0</div>
        <div style="color:#64748b;font-size:14px;">Avg Rating</div>
        <div style="color:#f59e0b;font-size:12px;margin-top:4px;" id="ratingChange">0</div>
    </div>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:15px;margin-bottom:20px;">
    <div class="card" style="padding:20px;">
        <h3 style="margin:0 0 15px 0;">📈 Sales Last 7 Days</h3>
        <canvas id="salesChart" style="max-height:250px;"></canvas>
    </div>
    <div class="card" style="padding:20px;">
        <h3 style="margin:0 0 15px 0;">🏪 Top Shops</h3>
        <div id="topShops"></div>
    </div>
</div>

<div class="card" style="padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
        <h3 style="margin:0;">📋 Recent Orders</h3>
        <select id="reportPeriod" onchange="loadReports()" style="padding:8px;border:1px solid #cbd5e1;border-radius:6px;">
            <option value="today">Today</option>
            <option value="week" selected>This Week</option>
            <option value="month">This Month</option>
            <option value="all">All Time</option>
        </select>
    </div>
    <table id="reportOrdersTable" style="width:100%;border-collapse:collapse;">
        <thead>
            <tr style="background:#f8fafc;border-bottom:2px solid #e2e8f0;">
                <th style="padding:12px;text-align:left;">Order ID</th>
                <th style="padding:12px;text-align:left;">User</th>
                <th style="padding:12px;text-align:left;">Shop</th>
                <th style="padding:12px;text-align:left;">Amount</th>
                <th style="padding:12px;text-align:left;">Status</th>
                <th style="padding:12px;text-align:left;">Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="card" style="padding:20px;margin-top:15px;">
    <h3 style="margin:0 0 15px 0;">🛍️ Top Selling Products</h3>
    <div id="topProducts"></div>
</div>

<style>
.badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.status-delivered { background: #d1fae5; color: #065f46; }
.status-cancelled { background: #fee2e2; color: #991b1b; }
.status-pending { background: #fef3c7; color: #92400e; }
</style>

<script>
async function loadReports() {
    const period = document.getElementById('reportPeriod').value;
    try {
        const data = await apiCall(`/reports?period=${period}`);
        updateStats(data.stats);
        renderSalesChart(data.salesData);
        renderTopShops(data.topShops);
        renderTopProducts(data.topProducts);
        renderRecentOrders(data.recentOrders);
        showToast('Reports loaded!', 'success');
    } catch(err) {
        showToast('Failed to load reports', 'error');
    }
}

function updateStats(stats) {
    document.getElementById('totalRevenue').textContent = `₹${stats.revenue || 0}`;
    document.getElementById('totalOrders').textContent = stats.orders || 0;
    document.getElementById('totalUsers').textContent = stats.users || 0;
    document.getElementById('avgRating').textContent = (stats.avgRating || 0).toFixed(1);
    
    document.getElementById('revenueChange').textContent = `${stats.revenueChange >= 0 ? '+' : ''}${stats.revenueChange || 0}%`;
    document.getElementById('ordersChange').textContent = `${stats.ordersChange >= 0 ? '+' : ''}${stats.ordersChange || 0}%`;
    document.getElementById('usersChange').textContent = `${stats.usersChange >= 0 ? '+' : ''}${stats.usersChange || 0}%`;
}

function renderSalesChart(salesData) {
    const canvas = document.getElementById('salesChart');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = 250;
    
    const data = salesData || [0,0,0];
    const max = Math.max(...data, 1);
    const barWidth = canvas.width / data.length - 10;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#3b82f6';
    
    data.forEach((val, i) => {
        const height = (val / max) * 180;
        const x = i * (barWidth + 10) + 5;
        const y = canvas.height - height - 30;
        ctx.fillRect(x, y, barWidth, height);
        
        ctx.fillStyle = '#64748b';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`₹${val}`, x + barWidth/2, y - 5);
        ctx.fillText(['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i], x + barWidth/2, canvas.height - 10);
        ctx.fillStyle = '#3b82f6';
    });
}

function renderTopShops(shops) {
    const container = document.getElementById('topShops');
    if(!shops || shops.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#64748b;">No data</div>';
        return;
    }
    container.innerHTML = shops.map((s, i) => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #e2e8f0;">
            <div>
                <div style="font-weight:600;">${i+1}. ${escapeHtml(s.name)}</div>
                <div style="font-size:12px;color:#64748b;">${s.orderCount} orders</div>
            </div>
            <div style="font-weight:700;color:#10b981;">₹${s.revenue}</div>
        </div>
    `).join('');
}

function renderTopProducts(products) {
    const container = document.getElementById('topProducts');
    if(!products || products.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:20px;color:#64748b;">No data</div>';
        return;
    }
    container.innerHTML = products.map((p, i) => `
        <div style="display:flex;gap:15px;align-items:center;padding:12px;border-bottom:1px solid #e2e8f0;">
            <img src="${p.image || 'https://via.placeholder.com/50'}" style="width:50px;height:50px;object-fit:cover;border-radius:6px;">
            <div style="flex:1;">
                <div style="font-weight:600;">${i+1}. ${escapeHtml(p.name)}</div>
                <div style="font-size:12px;color:#64748b;">${p.soldCount} sold</div>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:700;color:#10b981;">₹${p.revenue}</div>
                <div style="font-size:12px;color:#64748b;">₹${p.price} each</div>
            </div>
        </div>
    `).join('');
}

function renderRecentOrders(orders) {
    const tbody = document.querySelector('#reportOrdersTable tbody');
    if(!orders || orders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#64748b;">No orders found</td></tr>`;
        return;
    }
    tbody.innerHTML = orders.map(o => `
        <tr>
            <td><strong>#${o._id.slice(-6)}</strong></td>
            <td>${escapeHtml(o.userId?.name || 'Guest')}</td>
            <td>${escapeHtml(o.shopId?.name || '-')}</td>
            <td>₹${o.totalAmount || 0}</td>
            <td><span class="badge status-${o.status}">${o.status}</span></td>
            <td>${formatDate(o.createdAt)}</td>
        </tr>
    `).join('');
}

// Auto load
loadReports();
</script>
