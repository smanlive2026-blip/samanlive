<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Dashboard - SAMANLIVE</title>
    <link rel="stylesheet" href="/local-market/assets/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .shop-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px;
        }
        
        /* Header - Glass Effect */
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #334155;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #e2e8f0; transform: translateX(-2px); }
        
        .shop-title-wrap h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
        }
        .shop-type-label {
            margin: 4px 0 0 0;
            font-size: 13px;
            color: #64748b;
        }
        
        .badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.active, .badge.approved { background: #dcfce7; color: #166534; }
        .badge.pending { background: #fef3c7; color: #92400e; }
        .badge.rejected { background: #fee2e2; color: #991b1b; }
        .badge.inactive { background: #e5e7eb; color: #374151; }

        /* Stats Grid - Modern Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }
        .stat-card .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.9;
        }
        .stat-card h3 {
            margin: 0 0 6px 0;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
        }

        /* Shop Info Card */
        .content-area {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .content-area h3 {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-row { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; 
        }
        .info-item { 
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
        }
        .info-label { 
            color: #64748b; 
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }
        .info-value { 
            font-weight: 700; 
            color: #1e293b;
            font-size: 15px;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(16,185,129,0.4);
        }
        .btn-secondary { 
            background: rgba(255,255,255,0.95);
            color: #334155;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary:hover { background: white; transform: translateY(-2px); }
        .btn-danger { 
            background: #ef4444; 
            color: white;
            box-shadow: 0 4px 12px rgba(239,68,68,0.3);
        }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }
        .data-table th {
            text-align: left;
            padding: 12px 16px;
            color: #475569;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .data-table td {
            padding: 16px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-table td:first-child {
            border-left: 1px solid #e2e8f0;
            border-radius: 10px 0 0 10px;
        }
        .data-table td:last-child {
            border-right: 1px solid #e2e8f0;
            border-radius: 0 10px 10px 0;
        }
        .data-table tr:hover td {
            background: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 64px;
            color: #cbd5e1;
            margin-bottom: 16px;
        }
        .empty-state h4 {
            margin: 0 0 8px 0;
            color: #475569;
            font-size: 18px;
        }
        .empty-state p {
            margin: 0 0 20px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .table-responsive { overflow-x: auto; }
        .item-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }
        .item-badge.veg { background: #dcfce7; color: #166534; }
        .item-badge.non-veg { background: #fee2e2; color: #991b1b; }
        .item-badge.available { background: #dcfce7; color: #166534; }
        .item-badge.unavailable { background: #fee2e2; color: #991b1b; }

        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="shop-container">
        <!-- Header -->
        <div class="shop-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.history.back()">
                    <i class="fa fa-arrow-left"></i>
                </button>
                <div class="shop-title-wrap">
                    <h1 id="shopName">Loading...</h1>
                    <p id="shopTypeLabel" class="shop-type-label"></p>
                </div>
            </div>
            <span class="badge" id="shopStatus">Loading</span>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <h3 id="stat1Value">0</h3>
                <p id="stat1Label">Total Items</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🛒</div>
                <h3 id="stat2Value">0</h3>
                <p id="stat2Label">Total Orders</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <h3 id="stat3Value">0.0</h3>
                <p id="stat3Label">Rating</p>
            </div>
        </div>

        <!-- Shop Info Card -->
        <div class="content-area" id="shopInfoCard" style="display:none">
            <h3><i class="fa fa-info-circle"></i> Shop Information</h3>
            <div class="info-row">
                <div class="info-item">
                    <span class="info-label">Phone</span>
                    <span class="info-value" id="shopPhone">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Range</span>
                    <span class="info-value" id="shopRange">- KM</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Address</span>
                    <span class="info-value" id="shopAddress">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status</span>
                    <span class="info-value" id="shopOpenStatus">-</span>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar" id="actionBar">
            <button class="btn btn-primary" id="addProductBtn">
                <i class="fa fa-plus"></i> <span id="addBtnText">Add Product</span>
            </button>
            <button class="btn btn-secondary" onclick="loadOrders()">
                <i class="fa fa-list"></i> View Orders
            </button>
            <button class="btn btn-secondary" onclick="editShopInfo()">
                <i class="fa fa-edit"></i> Edit Shop
            </button>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <h3 id="itemsTitle"><i class="fa fa-box"></i> Products / Items</h3>
            <div class="table-responsive">
                <table class="data-table">
                    <thead id="tableHead">
                        <tr>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Unit</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr>
                            <td colspan="5">
                                <div class="empty-state">
                                    <i class="fa fa-box-open"></i>
                                    <h4>No Products Yet</h4>
                                    <p>Start by adding your first product to the shop</p>
                                    <button class="btn btn-primary" onclick="document.getElementById('addProductBtn').click()">
                                        <i class="fa fa-plus"></i> Add First Product
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modalContainer"></div>

    <!-- Loader -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get('shopId');
        const shopTypeParam = urlParams.get('type');
        const token = localStorage.getItem('userToken');
        let currentShop = null;
        let currentShopType = '';

        // Template types that have specific dashboards
        const SPECIFIC_TEMPLATES = ['cloth', 'kirana', 'medical', 'restaurant'];

        if (!shopId || !token) {
            alert('Invalid access. Please login again.');
            window.location.href = '/login.html';
        }

        // Shop Type Labels
        const shopTypeLabels = {
            'kirana': 'Kirana Store',
            'cloth': 'Cloth Store',
            'medical': 'Medical Store',
            'restaurant': 'Restaurant',
            'product': 'Product Store',
            'food': 'Restaurant / Food',
            'service': 'Service Provider',
            'rental': 'Rental Shop',
            'fashion': 'Fashion / Cloth'
        };

        // Table Headers by Shop Type - Updated per MANIFEST
        const tableHeaders = {
            'kirana': ['Product', 'Weight', 'MRP', 'Selling Price', 'Stock', 'Actions'],
            'cloth': ['Item', 'Category', 'Size', 'Color', 'Fabric', 'Price', 'Stock', 'Actions'],
            'medical': ['Medicine', 'Company', 'Batch No', 'Expiry', 'MRP', 'Stock', 'Actions'],
            'restaurant': ['Dish Name', 'Category', 'Type', 'Price', 'Available', 'Actions'],
            'product': ['Name', 'Price', 'Unit', 'Status', 'Actions'],
            'food': ['Name', 'Price', 'Type', 'Status', 'Actions'],
            'service': ['Name', 'Price', 'Duration', 'Status', 'Actions'],
            'rental': ['Name', 'Price/Hour', 'Available', 'Status', 'Actions'],
            'fashion': ['Name', 'Size', 'Color', 'Price', 'Actions']
        };

        // Load Shop Data
        async function loadShopData() {
            try {
                const res = await fetch(`/api/local-market/shops/${shopId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const shop = await res.json();

                if (!shop._id) {
                    alert('Shop not found');
                    window.location.href = '/local-market/create-shop.html';
                    return;
                }

                currentShop = shop;
                currentShopType = shop.shopType || shopTypeParam || 'product';

                // KEY UPDATE: Redirect to specific template if exists
                if (SPECIFIC_TEMPLATES.includes(currentShopType)) {
                    window.location.replace(`/local-market/shop-templates/${currentShopType}/dashboard.html?shopId=${shopId}`);
                    return;
                }

                // Continue as fallback generic dashboard
                document.getElementById('shopName').innerText = shop.shopName;
                document.getElementById('shopTypeLabel').innerText = shopTypeLabels[currentShopType] || currentShopType;
                
                const statusEl = document.getElementById('shopStatus');
                statusEl.innerText = shop.status.toUpperCase();
                statusEl.className = 'badge ' + shop.status;

                // Update Stats
                const items = shop.items || shop.products || [];
                document.getElementById('stat1Value').innerText = items.length;
                document.getElementById('stat2Value').innerText = shop.totalOrders || 0;
                document.getElementById('stat3Value').innerText = shop.rating ? shop.rating.toFixed(1) : '0.0';

                // Update Shop Info
                document.getElementById('shopPhone').innerText = shop.phone || shop.mobile || '-';
                document.getElementById('shopRange').innerText = shop.range ? (shop.range / 1000) + ' KM' : '- KM';
                document.getElementById('shopAddress').innerText = shop.address?.line1 || shop.address || shop.area || '-';
                document.getElementById('shopOpenStatus').innerText = shop.isOpen ? '🟢 Open' : '🔴 Closed';
                document.getElementById('shopInfoCard').style.display = 'block';

                // Update Add Button Text
                const btnTexts = {
                    'kirana': 'Add Product',
                    'cloth': 'Add Garment',
                    'medical': 'Add Medicine',
                    'restaurant': 'Add Menu Item',
                    'food': 'Add Menu Item',
                    'service': 'Add Service',
                    'rental': 'Add Rental Item',
                    'fashion': 'Add Product',
                    'product': 'Add Product'
                };
                document.getElementById('addBtnText').innerText = btnTexts[currentShopType] || 'Add Item';
                document.getElementById('itemsTitle').innerHTML = '<i class="fa fa-box"></i> ' + (btnTexts[currentShopType]?.replace('Add ', '') + 's' || 'Products / Items');

                // Update Table Headers
                updateTableHeaders();

                // Load Items
                loadItems(items);

                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                console.error(err);
                alert('Failed to load shop: ' + err.message);
                document.getElementById('loader').style.display = 'none';
            }
        }

        // Update Table Headers based on shop type
        function updateTableHeaders() {
            const headers = tableHeaders[currentShopType] || tableHeaders['product'];
            const thead = document.getElementById('tableHead');
            thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
        }

        // Load Items Table
        function loadItems(items) {
            const tbody = document.getElementById('productTableBody');
            const headers = tableHeaders[currentShopType] || tableHeaders['product'];
            
            if (!items || items.length === 0) {
                tbody.innerHTML = `<tr>
                    <td colspan="${headers.length}">
                        <div class="empty-state">
                            <i class="fa fa-box-open"></i>
                            <h4>No Products Yet</h4>
                            <p>Start by adding your first product to the shop</p>
                            <button class="btn btn-primary" onclick="document.getElementById('addProductBtn').click()">
                                <i class="fa fa-plus"></i> Add First Product
                            </button>
                        </div>
                    </td>
                </tr>`;
                return;
            }

            tbody.innerHTML = items.map(item => renderItemRow(item, currentShopType)).join('');
        }

        // Render Item Row based on shop type
        function renderItemRow(item, type) {
            switch(type) {
                case 'kirana':
                    return `<tr>
                        <td>${item.name}</td>
                        <td>${item.weight || '-'} ${item.unit || ''}</td>
                        <td>₹${item.mrp || item.price}</td>
                        <td>₹${item.price}</td>
                        <td>${item.stock || 0}</td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
                
                case 'cloth':
                case 'fashion':
                    return `<tr>
                        <td>${item.name}</td>
                        <td>${item.category || '-'}</td>
                        <td>${item.size || '-'}</td>
                        <td>${item.color || '-'}</td>
                        <td>${item.fabric || '-'}</td>
                        <td>₹${item.price}</td>
                        <td>${item.stock || 0}</td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
                
                case 'medical':
                    return `<tr>
                        <td>${item.name}</td>
                        <td>${item.company || '-'}</td>
                        <td>${item.batch || '-'}</td>
                        <td>${item.expiry || '-'}</td>
                        <td>₹${item.price}</td>
                        <td>${item.stock || 0}</td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
                
                case 'restaurant':
                case 'food':
                    return `<tr>
                        <td>${item.name}</td>
                        <td>${item.category || '-'}</td>
                        <td><span class="item-badge ${item.foodType === 'veg' ? 'veg' : 'non-veg'}">${item.foodType || 'veg'}</span></td>
                        <td>₹${item.price}</td>
                        <td><span class="item-badge ${item.available !== false ? 'available' : 'unavailable'}">${item.available !== false ? 'Yes' : 'No'}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
                
                case 'service':
                    return `<tr>
                        <td>${item.name}</td>
                        <td>₹${item.price}</td>
                        <td>${item.duration || '-'} min</td>
                        <td><span class="item-badge ${item.available ? 'available' : 'unavailable'}">${item.available ? 'Available' : 'Unavailable'}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
                
                case 'rental':
                    return `<tr>
                        <td>${item.name}</td>
                        <td>₹${item.price}/hr</td>
                        <td><span class="item-badge ${item.available ? 'available' : 'unavailable'}">${item.available ? 'Yes' : 'No'}</span></td>
                        <td><span class="item-badge ${item.available ? 'available' : 'unavailable'}">${item.available ? 'Available' : 'Unavailable'}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
                
                default: // product
                    return `<tr>
                        <td>${item.name}</td>
                        <td>₹${item.price}</td>
                        <td>${item.unit || '-'}</td>
                        <td><span class="item-badge ${item.available !== false ? 'available' : 'unavailable'}">${item.available !== false ? 'Available' : 'Unavailable'}</span></td>
                        <td>
                            <button class="btn btn-secondary" onclick="editItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Edit</button>
                            <button class="btn btn-danger" onclick="deleteItem('${item._id}')" style="padding:6px 12px;font-size:12px;">Delete</button>
                        </td>
                    </tr>`;
            }
        }

        // Add Product Handler
        document.getElementById('addProductBtn').onclick = function() {
            if (SPECIFIC_TEMPLATES.includes(currentShopType)) {
                window.location.href = `/local-market/shop-templates/${currentShopType}/product-form.html?shopId=${shopId}`;
            } else {
                alert('Add Product form for ' + currentShopType + ' coming soon!');
            }
        };

        // Edit Shop Info
        function editShopInfo() {
            window.location.href = `/local-market/edit-shop.html?shopId=${shopId}`;
        }

        // Load Orders Handler
        function loadOrders() {
            window.location.href = `/local-market/orders.html?shopId=${shopId}`;
        }

        // Edit Item
        function editItem(itemId) {
            alert('Edit item: ' + itemId + ' - Feature coming soon!');
        }

        // Delete Item
        async function deleteItem(itemId) {
            if (!confirm('Delete this item?')) return;
            try {
                await fetch(`/api/local-market/products/${itemId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                alert('Item deleted!');
                loadShopData();
            } catch (err) {
                alert('Failed to delete: ' + err.message);
            }
        }

        // Init
        loadShopData();
    </script>
</body>
</html>
