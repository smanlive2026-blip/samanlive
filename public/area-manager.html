<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Manager - SAMANLIVE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f1f5f9; }
        .login-container {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .login-box {
            background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%; max-width: 400px;
        }
        .login-box h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #475569; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #6366f1; }
        .btn {
            width: 100%; padding: 14px; background: #6366f1; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #4f46e5; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-small { padding: 8px 16px; font-size: 14px; width: auto; }
        
        .dashboard { display: none; }
        .header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 24px; }
        .header-right { display: flex; gap: 15px; align-items: center; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;
        }
        .stat-card {
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 { color: #64748b; font-size: 14px; margin-bottom: 10px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #1e293b; }
        .card {
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 25px;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 2px solid #f1f5f9;
        }
        .card-header h2 { color: #1e293b; font-size: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .actions { display: flex; gap: 8px; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { color: #1e293b; }
        .close-btn {
            background: #f1f5f9; border: none; width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; font-size: 20px; color: #64748b;
        }
        #map { height: 300px; border-radius: 8px; margin-top: 10px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .banner-preview { width: 100%; max-width: 400px; margin-top: 10px; border-radius: 8px; display: none; }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <h1>👨‍💼 Area Manager Login</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="manager@test.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>🏪 Area Manager Dashboard</h1>
            <div class="header-right">
                <span id="managerName"></span>
                <button class="btn btn-small btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="container">
            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>TOTAL SHOPS</h3>
                    <div class="value" id="totalShops">0</div>
                </div>
                <div class="stat-card">
                    <h3>ACTIVE SHOPS</h3>
                    <div class="value" id="activeShops">0</div>
                </div>
                <div class="stat-card">
                    <h3>AREA NAME</h3>
                    <div class="value" style="font-size: 20px;" id="areaName">-</div>
                </div>
            </div>

            <!-- SHOPS TABLE -->
            <div class="card">
                <div class="card-header">
                    <h2>📍 My Area Shops</h2>
                    <button class="btn btn-small" onclick="openShopModal()">+ Add New Shop</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Icon</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="shopsTable">
                            <tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- SHOP MODAL -->
    <div class="modal" id="shopModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Shop</h2>
                <button class="close-btn" onclick="closeShopModal()">×</button>
            </div>
            <form id="shopForm">
                <input type="hidden" id="shopId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Shop Name *</label>
                        <input type="text" id="shopName" required>
                    </div>
                    <div class="form-group">
                        <label>Icon</label>
                        <input type="text" id="shopIcon" placeholder="🏪" maxlength="2">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="shopCategory" required></select>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="shopPhone" placeholder="9876543210">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="shopAddress" rows="2" placeholder="Full address"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Latitude *</label>
                        <input type="number" step="any" id="shopLat" required readonly>
                    </div>
                    <div class="form-group">
                        <label>Longitude *</label>
                        <input type="number" step="any" id="shopLng" required readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label>Select Location on Map *</label>
                    <div id="map"></div>
                    <small style="color: #64748b;">Map pe click karke shop ki location select karo</small>
                </div>
                <div class="form-group">
                    <label>Service Range (meters)</label>
                    <input type="number" id="shopRange" value="5000" min="100" max="50000">
                </div>
                <!-- BANNER UPLOAD - NAYA ADD KIYA -->
                <div class="form-group">
                    <label>Shop Banner Image (Market me dikhega)</label>
                    <input type="file" id="shopBannerInput" accept="image/*" onchange="uploadShopBanner(this)">
                    <small style="color:#64748b;display:block;margin-top:5px;">Size: 800x200 px recommended</small>
                    <img id="shopBannerPreview" class="banner-preview">
                    <input type="hidden" id="shopBannerUrl">
                </div>
                <button type="submit" class="btn">Save Shop</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let token = localStorage.getItem('areaManagerToken');
        let managerData = null;
        let map = null;
        let marker = null;
        let categories = [];

        // Check if already logged in
        if (token) {
            showDashboard();
        }

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/area-manager/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    token = data.token;
                    localStorage.setItem('areaManagerToken', token);
                    managerData = data.manager;
                    showDashboard();
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        // SHOW DASHBOARD
        async function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            await loadDashboard();
        }

        // LOAD DASHBOARD DATA
        async function loadDashboard() {
            try {
                const res = await fetch('/api/area-manager/dashboard', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('managerName').textContent = managerData.name;
                    document.getElementById('areaName').textContent = data.area.name;
                    document.getElementById('totalShops').textContent = data.stats.totalShops;
                    document.getElementById('activeShops').textContent = data.stats.activeShops;
                    
                    categories = data.categories;
                    renderShops(data.shops);
                } else {
                    alert(data.error);
                    logout();
                }
            } catch (err) {
                alert('Error loading dashboard');
                logout();
            }
        }

        // RENDER SHOPS
        function renderShops(shops) {
            const tbody = document.getElementById('shopsTable');
            if (shops.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color: #94a3b8;">Koi shop nahi hai. Add karo!</td></tr>';
                return;
            }

            tbody.innerHTML = shops.map(shop => `
                <tr>
                    <td style="font-size: 24px;">${shop.icon}</td>
                    <td><strong>${shop.name}</strong></td>
                    <td>${getCategoryName(shop.categoryId)}</td>
                    <td>${shop.address || '-'}</td>
                    <td>
                        <span class="badge ${shop.status ? 'badge-success' : 'badge-danger'}">
                            ${shop.status ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-small" onclick='editShop(${JSON.stringify(shop)})'>Edit</button>
                            <button class="btn btn-small btn-danger" onclick="deleteShop('${shop.id}')">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function getCategoryName(id) {
            const cat = categories.find(c => c.id === id);
            return cat ? cat.name : '-';
        }

        // SHOP MODAL
        function openShopModal(shop = null) {
            document.getElementById('shopModal').classList.add('active');
            document.getElementById('modalTitle').textContent = shop ? 'Edit Shop' : 'Add New Shop';
            
            // Load categories
            const catSelect = document.getElementById('shopCategory');
            catSelect.innerHTML = categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');

            if (shop) {
                document.getElementById('shopId').value = shop.id;
                document.getElementById('shopName').value = shop.name;
                document.getElementById('shopIcon').value = shop.icon;
                document.getElementById('shopCategory').value = shop.categoryId;
                document.getElementById('shopPhone').value = shop.phone || '';
                document.getElementById('shopAddress').value = shop.address || '';
                document.getElementById('shopLat').value = shop.lat;
                document.getElementById('shopLng').value = shop.lng;
                document.getElementById('shopRange').value = shop.range || 5000;
                document.getElementById('shopBannerUrl').value = shop.banner || '';
                if(shop.banner) {
                    document.getElementById('shopBannerPreview').src = shop.banner;
                    document.getElementById('shopBannerPreview').style.display = 'block';
                }
                initMap(shop.lat, shop.lng);
            } else {
                document.getElementById('shopForm').reset();
                document.getElementById('shopId').value = '';
                document.getElementById('shopBannerPreview').style.display = 'none';
                initMap(23.0225, 72.5714); // Default Surat
            }
        }

        function closeShopModal() {
            document.getElementById('shopModal').classList.remove('active');
        }

        function editShop(shop) {
            openShopModal(shop);
        }

        // BANNER UPLOAD - NAYA FUNCTION
        async function uploadShopBanner(input) {
            if(input.files[0]) {
                const formData = new FormData();
                formData.append('file', input.files[0]);

                try {
                    const res = await fetch('/api/admin/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();

                    if(data.success) {
                        document.getElementById('shopBannerUrl').value = data.url;
                        document.getElementById('shopBannerPreview').src = data.url;
                        document.getElementById('shopBannerPreview').style.display = 'block';
                    }
                } catch(err) {
                    alert('Banner upload failed!');
                }
            }
        }

        // INIT MAP
        function initMap(lat, lng) {
            if (map) map.remove();
            map = L.map('map').setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            marker = L.marker([lat, lng], { draggable: true }).addTo(map);
            
            marker.on('dragend', function(e) {
                const pos = e.target.getLatLng();
                document.getElementById('shopLat').value = pos.lat.toFixed(6);
                document.getElementById('shopLng').value = pos.lng.toFixed(6);
            });

            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                document.getElementById('shopLat').value = e.latlng.lat.toFixed(6);
                document.getElementById('shopLng').value = e.latlng.lng.toFixed(6);
            });
        }

        // SAVE SHOP - BANNER FIELD ADD KIYA
        document.getElementById('shopForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const shopId = document.getElementById('shopId').value;
            const shopData = {
                name: document.getElementById('shopName').value,
                icon: document.getElementById('shopIcon').value,
                categoryId: document.getElementById('shopCategory').value,
                phone: document.getElementById('shopPhone').value,
                address: document.getElementById('shopAddress').value,
                lat: document.getElementById('shopLat').value,
                lng: document.getElementById('shopLng').value,
                range: document.getElementById('shopRange').value,
                banner: document.getElementById('shopBannerUrl').value // BANNER ADD KIYA
            };

            try {
                const url = shopId ? `/api/area-manager/shop/${shopId}` : '/api/area-manager/shop';
                const method = shopId ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(shopData)
                });
                const data = await res.json();

                if (data.success) {
                    alert(shopId ? 'Shop updated!' : 'Shop added!');
                    closeShopModal();
                    loadDashboard();
                } else {
                    alert(data.error || 'Error saving shop');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        // DELETE SHOP
        async function deleteShop(id) {
            if (!confirm('Pakka delete karna hai?')) return;
            
            try {
                const res = await fetch(`/api/area-manager/shop/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                if (data.success) {
                    alert('Shop deleted!');
                    loadDashboard();
                } else {
                    alert(data.error || 'Error deleting shop');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        // LOGOUT
        function logout() {
            localStorage.removeItem('areaManagerToken');
            token = null;
            location.reload();
        }
    </script>
</body>
</html>
