<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Market - SuperLive</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/theme.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .module-header {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            padding: 32px 20px;
            text-align: center;
            margin-bottom: 24px;
        }
        .module-header h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
        }
        .module-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 14px;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 0 16px;
            margin-bottom: 32px;
        }
        .category-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-color: #6366f1;
        }
        .category-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .category-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .category-count {
            font-size: 12px;
            color: #64748b;
        }
        .shops-section {
            padding: 0 16px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1e293b;
        }
        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .shop-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
        }
        .shop-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .shop-banner {
            width: 100%;
            height: 120px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .shop-body {
            padding: 16px;
        }
        .shop-header-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }
        .shop-logo {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #f1f5f9;
        }
        .shop-info {
            flex: 1;
        }
        .shop-name {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .shop-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .shop-type.product { background: #dbeafe; color: #1e40af; }
        .shop-type.food { background: #fed7aa; color: #c2410c; }
        .shop-type.service { background: #e9d5ff; color: #7c3aed; }
        .shop-type.rental { background: #d1fae5; color: #059669; }
        .shop-type.fashion { background: #fce7f3; color: #be185d; }
        .shop-meta {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: #64748b;
            margin-top: 8px;
        }
        .shop-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 2px solid #e2e8f0;
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin: 16px;
            text-decoration: none;
            color: #1e293b;
        }
        .back-btn:hover {
            background: #f8fafc;
        }
        .loading, .empty {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .breadcrumb {
            padding: 16px;
            font-size: 14px;
            color: #64748b;
        }
        .breadcrumb a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="module-header">
            <div style="font-size:48px;margin-bottom:12px;">🛒</div>
            <h1>LOCAL MARKET</h1>
            <p>Grocery, Electronics, Fashion & All Local Shops</p>
        </div>

        <div id="categoriesView">
            <div class="section-title" style="padding:0 16px;">📂 Browse Categories</div>
            <div id="categoriesGrid" class="categories-grid">
                <div class="loading">Loading categories...</div>
            </div>
        </div>

        <div id="shopsView" style="display:none;">
            <div class="breadcrumb">
                <a href="#" onclick="showCategories()">← All Categories</a> / 
                <span id="currentCategoryName"></span>
            </div>
            <div class="shops-section">
                <div class="section-title">🏪 Shops in <span id="categoryTitle"></span></div>
                <div id="shopsGrid" class="shops-grid">
                    <div class="loading">Loading shops...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/js/common.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
