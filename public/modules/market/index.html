<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Market - SAMANLIVE</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <style>
        .market-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .market-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .market-header h1 {
            font-size: 42px;
            color: #10b981;
            margin-bottom: 10px;
        }
        .market-header p {
            color: #64748b;
            font-size: 16px;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .category-card {
            background: white;
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            border-color: var(--cat-color);
        }
        .category-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .category-name {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #64748b;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            color: #ef4444;
        }
        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .shop-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .shop-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .shop-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .shop-icon {
            font-size: 40px;
        }
        .shop-info h3 {
            margin: 0;
            color: #1e293b;
            font-size: 18px;
        }
        .shop-address {
            color: #64748b;
            font-size: 13px;
            margin-top: 5px;
        }
        .shop-distance {
            background: #10b981;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }
        .back-btn {
            background: #6366f1;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        .back-btn:hover {
            background: #4f46e5;
        }
        @media (max-width: 768px) {
            .categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }
            .category-card {
                padding: 20px 10px;
            }
            .category-icon {
                font-size: 40px;
            }
            .market-header h1 {
                font-size: 32px;
            }
            .shops-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="video-bg"><div class="video-overlay"></div></div>
    
    <header class="header" style="background: linear-gradient(135deg, #10b981, #059669);">
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">S</div>
                <span class="logo-text">SAMANLIVE</span>
            </div>
            <a href="/" style="color:white;text-decoration:none;font-weight:600;">← Home</a>
        </div>
    </header>

    <main class="main-content">
        <div class="market-container" id="mainContainer">
            <div class="market-header">
                <h1>🛒 Local Market</h1>
                <p>Aas-paas ki sabhi dukaanen ek jagah</p>
            </div>

            <div id="categoriesBox" class="categories-grid">
                <div class="loading">Loading categories...</div>
            </div>
        </div>
    </main>

    <script>
        let currentCategories = [];

        async function loadCategories() {
            try {
                const res = await fetch('/api/market/categories');
                if (!res.ok) throw new Error('API Error');
                
                const categories = await res.json();
                currentCategories = categories;
                const box = document.getElementById('categoriesBox');
                
                if (categories.length === 0) {
                    box.innerHTML = '<div class="loading">Koi category nahi mili</div>';
                    return;
                }

                box.innerHTML = categories.map(cat => `
                    <div class="category-card" style="--cat-color: ${cat.color}" onclick="openCategory('${cat.id}', '${cat.name}', '${cat.icon}')">
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-name">${cat.name}</div>
                    </div>
                `).join('');
                
            } catch(err) {
                console.error(err);
                document.getElementById('categoriesBox').innerHTML = 
                    '<div class="error">Error loading categories 😢<br><small>Server chalu hai?</small></div>';
            }
        }

        async function openCategory(id, name, icon) {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="market-header">
                    <button class="back-btn" onclick="backToCategories()">← Back to Categories</button>
                    <h1>${icon} ${name}</h1>
                    <p>Is category ki sabhi dukaanen</p>
                </div>
                <div id="shopsBox" class="loading">Loading shops...</div>
            `;

            try {
                let url = `/api/market/shops/${id}`;
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        url += `?lat=${lat}&lng=${lng}`;
                        await fetchShops(url);
                    }, async () => {
                        await fetchShops(url);
                    });
                } else {
                    await fetchShops(url);
                }
            } catch(err) {
                console.error(err);
                document.getElementById('shopsBox').innerHTML = 
                    '<div class="error">Error loading shops 😢</div>';
            }
        }

        async function fetchShops(url) {
            const res = await fetch(url);
            const shops = await res.json();
            const box = document.getElementById('shopsBox');
            
            if (shops.length === 0) {
                box.innerHTML = '<div class="loading">Is category me abhi koi shop nahi hai 😔</div>';
                return;
            }

            box.innerHTML = `
                <div class="shops-grid">
                    ${shops.map(shop => `
                        <div class="shop-card">
                            <div class="shop-header">
                                <div class="shop-icon">${shop.icon}</div>
                                <div class="shop-info">
                                    <h3>${shop.name}</h3>
                                    <div class="shop-address">📍 ${shop.address || 'Address not available'}</div>
                                </div>
                            </div>
                            ${shop.distance ? `<div class="shop-distance">${shop.distance}m door</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function backToCategories() {
            location.reload();
        }

        loadCategories();
    </script>
</body>
</html>
