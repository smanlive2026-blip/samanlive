<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Market - SAMANLIVE</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="video-bg"><div class="video-overlay"></div></div>
    
    <header class="header" style="background: linear-gradient(135deg, #10b981, #059669);">
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">S</div>
                <span class="logo-text">SAMANLIVE</span>
            </div>
            <a href="/" style="color:white;text-decoration:none;font-weight:600;">← Home</a>
        </div>
    </header>

    <main class="main-content">
        <div class="market-container" id="mainContainer">
            <div class="market-header">
                <h1>🛒 Local Market</h1>
                <p>Aas-paas ki 250+ dukaanen ek jagah</p>
                
                <!-- ADDED BY AI - Search Bar for 250 Categories -->
                <div class="market-search-box">
                    <input type="text" id="categorySearch" placeholder="🔍 Category search karo... Grocery, Electronics, etc">
                </div>
                
                <!-- ADDED BY AI - Filter Buttons -->
                <div class="market-filters">
                    <button class="filter-btn active" data-filter="all">All 250</button>
                    <button class="filter-btn" data-filter="popular">Popular</button>
                    <button class="filter-btn" data-filter="az">A-Z</button>
                </div>
            </div>

            <!-- MODIFIED BY AI - Categories Grid for 250 -->
            <div id="categoriesBox" class="categories-grid">
                <div class="loading">Loading 250 categories...</div>
            </div>
            
            <!-- ADDED BY AI - Total Count -->
            <div class="category-count">
                Total: <span id="totalCount">250</span> Categories
            </div>
        </div>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
